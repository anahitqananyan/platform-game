// ── Platform helpers ──────────────────────────────────────────────────────────

// Build a platform from fractional coords (0–1) relative to W/H
function mkp(xf, yf, wf, extra) {
  const x = Math.round(xf * W), y = Math.round(yf * H), w = Math.round(wf * W);
  return Object.assign({ x, y, w, baseX:x, baseY:y }, extra || {});
}

// ── Level 1 — original sketch layout, scaled to any viewport ─────────────────

function level1() {
  const ps = [
    mkp(0.020, 0.128, 0.244),
    mkp(0.345, 0.247, 0.227, { moveX:true, speed:0.019, range:Math.round(W*0.059) }),
    mkp(0.664, 0.180, 0.200),
    mkp(0.040, 0.469, 0.214),
    mkp(0.464, 0.586, 0.186, { moveY:true, speed:0.024, range:Math.round(H*0.078), phase:0 }),
    mkp(0.745, 0.734, 0.214, { moveX:true, speed:0.016, range:Math.round(W*0.050) }),
    mkp(0.845, 0.250, 0.150),   // end platform
    mkp(0.100, 0.894, 0.223),   // spawn
  ];
  return makeLevelData(ps, ps.length - 2);
}

// ── Random level generator ────────────────────────────────────────────────────

function generateLevel(num) {
  const rng  = seededRng(num * 9973 + 1234);
  const ps   = [];
  let   moved = 0;

  // hard: 0 at level 1 → 1 at level 20+
  const hard = Math.min((num - 1) / 19, 1);

  // End platform: top-right, always static
  const ey = Math.round(H * (0.172 + rng()*0.156));
  const ex = Math.round(W * 0.787), ew = Math.round(W * 0.168);

  // Spawn: bottom-left, always static
  const sy = Math.round(H * 0.888), sx = Math.round(W * 0.055), sw = Math.round(W * 0.182);

  // ── Guaranteed path (static bridges, always reachable) ───────────────────
  // Physics: max horiz jump ~W*0.214, max upward ~H*0.272
  // Fewer bridges at higher levels = bigger gaps = harder.
  // Min 3 bridges keeps each step within physics limits (W*0.181 < W*0.214).
  const BRIDGES  = 4 - Math.round(hard * 2);     // 4 (easy) → 2 (hard)
  const MAX_HOP  = W * 0.185;                     // safe horizontal reach
  const MAX_UP   = H * 0.245;                     // safe upward reach
  const cx0 = sx + sw * 0.5,  cy0 = sy;
  const cx1 = ex + ew * 0.5,  cy1 = ey;
  let prevCX = cx0, prevCY = cy0;

  for (let i = 1; i <= BRIDGES; i++) {
    const t  = i / (BRIDGES + 1);
    // Width shrinks with difficulty: W*0.16 → W*0.09
    const bw = Math.max(Math.round(W * 0.09),
                        Math.round(W * (0.16 - hard * 0.07 + (rng()-0.5) * 0.02)));

    // Straight-line position + small jitter
    let bx = cx0 + (cx1 - cx0) * t + (rng()-0.5) * W * 0.04;
    let by = cy0 + (cy1 - cy0) * t + (rng()-0.5) * H * 0.03;

    // Clamp so it stays within jump range of the previous platform
    bx = Math.min(bx, prevCX + MAX_HOP);
    bx = Math.max(bx, prevCX - W * 0.05);
    by = Math.max(by, prevCY - MAX_UP);

    // Ensure overall left→right progress
    bx = Math.max(bx, cx0 + (cx1 - cx0) * (i - 1) / (BRIDGES + 1));

    const px = Math.max(Math.round(W * 0.02), Math.round(bx - bw / 2));
    const py = Math.round(by);
    if (px + bw < W * 0.97) {
      ps.push({ x:px, y:py, w:bw, baseX:px, baseY:py });
      prevCX = px + bw / 2;
      prevCY = py;
    }
  }

  // ── Extra random platforms (fewer over time, but more of them move) ────────
  const rowH      = H * 0.170,    colW     = W * 0.310;
  const extraRows = 2 - Math.round(hard * 1);         // 2 (easy) → 1 (hard)
  const maxMoved  = 2 + Math.round(hard * 5);         // 2 → 7 moving platforms
  const movChance = 0.25 + hard * 0.45;               // 25% → 70%
  const spdBoost  = hard * 0.018;                     // platforms get faster

  for (let r = 0; r < extraRows; r++) {
    const cols = [0,1,2].sort(() => rng()-0.5).slice(0, 1+Math.round(rng()));
    for (const c of cols) {
      const x = Math.round(W*0.036 + c*colW + rng()*colW*0.28);
      const y = Math.round(H*0.100 + r*rowH  + rng()*rowH*0.48);
      const w = Math.round(W*(0.118 + rng()*0.109));
      if (x + w < W * 0.97) {
        const extra = {};
        if (moved < maxMoved && rng() < movChance) {
          if (rng() < 0.5) {
            extra.moveX = true;
            extra.speed = 0.014 + rng()*0.016 + spdBoost;
            extra.range = Math.round(W*(0.036 + rng()*0.050));
          } else {
            extra.moveY = true;
            extra.speed = 0.017 + rng()*0.016 + spdBoost;
            extra.range = Math.round(H*(0.047 + rng()*0.066));
            extra.phase = rng() * Math.PI * 2;
          }
          moved++;
        }
        ps.push(Object.assign({ x, y, w, baseX:x, baseY:y }, extra));
      }
    }
  }

  ps.push({ x:ex, y:ey, w:ew, baseX:ex, baseY:ey }); // end platform
  ps.push({ x:sx, y:sy, w:sw });                      // spawn
  return makeLevelData(ps, ps.length - 2, rng);
}

function makeLevelData(ps, endIdx, rng) {
  const r = rng || (() => Math.random());
  const ep = ps[endIdx];
  const dw = Math.round(W * 0.034);
  const dh = Math.round(H * 0.091);

  // Pick 3 random platforms for keys (not end platform, not spawn)
  const spawnIdx = ps.length - 1;
  const candidates = ps.filter((_, i) => i !== endIdx && i !== spawnIdx);
  for (let i = candidates.length - 1; i > 0; i--) {
    const j = Math.floor(r() * (i + 1));
    [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
  }
  const kItems = candidates.slice(0, 3).map(p => ({
    platRef: p,
    xOffset: Math.round(p.w * (0.2 + r() * 0.6)),
    collected: false
  }));

  const DOOR_BODY     = ['#D4956A','#7EC8C8','#A8D8A8','#F1948A','#C8A8D8','#E8D48A','#A8D0E8'];
  const DOOR_BODY_W   = [
    ['#FF6600','#FF4500','#FFA500','#FF8C00','#FFD700','#FF3300','#FF7700'],
    ['#00C853','#1DE9B6','#00B0FF','#26C6DA','#64FFDA','#00E5FF','#76FF03'],
    ['#AA00FF','#D500F9','#FF4081','#E040FB','#FF80AB','#7C4DFF','#EA80FC'],
  ];
  const bodyPool = activeWorld > 0 ? DOOR_BODY_W[activeWorld - 1] : DOOR_BODY;
  const framePal = getPlatPal();
  const bodyCol  = bodyPool[Math.floor(r() * bodyPool.length)];
  const frameCol = framePal[Math.floor(r() * framePal.length)];

  return {
    ps,
    door: { x:ep.x+ep.w-dw-6, y:ep.y-dh, platY:ep.y, w:dw, h:dh, open:false, bodyCol, frameCol },
    keyItems: kItems
  };
}

function seededRng(seed) {
  let s = seed >>> 0;
  return function() {
    s += 0x6D2B79F5; let t = s;
    t = Math.imul(t ^ t>>>15, t|1);
    t ^= t + Math.imul(t ^ t>>>7, t|61);
    return ((t ^ t>>>14) >>> 0) / 4294967296;
  };
}

// ── Remix: horizontal mirror of any level ────────────────────────────────────

function mirrorLevel(lvlData) {
  const origPs = lvlData.ps;

  const ps = origPs.map(p => {
    const nx  = W - p.x     - p.w;
    const nbx = W - p.baseX - p.w;
    return Object.assign({}, p, { x: nx, baseX: nbx });
  });

  const endIdx = ps.length - 2;
  const ep     = ps[endIdx];
  const dw = Math.round(W * 0.034);
  const dh = Math.round(H * 0.091);

  // Door now sits near the LEFT edge of the (mirrored) end platform
  const door = Object.assign({}, lvlData.door, {
    x:     ep.x + 6,
    y:     ep.y - dh,
    platY: ep.y,
    w:     dw,
    h:     dh,
  });

  const keyItems = lvlData.keyItems.map(k => {
    const idx      = origPs.indexOf(k.platRef);
    const newPlat  = ps[idx];
    // Mirror xOffset so the key ends up at the symmetric position on the platform
    const mo = Math.max(4, Math.min(newPlat.w - 4, newPlat.w - k.xOffset));
    return Object.assign({}, k, { platRef: newPlat, xOffset: mo });
  });

  return { ps, door, keyItems };
}

function getLevel(num) {
  const data = num === 0 ? level1() : generateLevel(num);
  return activeWorld > 0 ? mirrorLevel(data) : data;
}

// ── Background blobs ──────────────────────────────────────────────────────────

const BLOB_COLS = ['#FF6B6B','#FF9F43','#FECA57','#1DD1A1','#48DBFB','#54A0FF','#FF9FF3','#A29BFE','#00CEC9'];
const BLOB_COLS_WORLDS = [
  ['#FF6B6B','#FF9F43','#FECA57','#1DD1A1','#48DBFB','#54A0FF','#FF9FF3','#A29BFE','#00CEC9'],  // normal
  ['#FF4500','#FF8C00','#FFD700','#FF3300','#FFA500','#FF6600','#FF1A00','#FFAB00'],             // world I – fire
  ['#00C853','#1DE9B6','#00B0FF','#00E5FF','#64FFDA','#76FF03','#00BFA5','#40C4FF'],             // world II – ocean
  ['#AA00FF','#E040FB','#FF4081','#F50057','#7C4DFF','#CE93D8','#FF80AB','#EA80FC'],             // world III – cosmic
];

function hexAlpha(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function bakeSky(lvl) {
  skyCanvas = document.createElement('canvas');
  skyCanvas.width  = W;
  skyCanvas.height = H;
  const sc  = skyCanvas.getContext('2d');
  const rng = seededRng(lvl * 3137 + 512);

  // Sky gradient: deeper blue at top, soft hazy at horizon
  const sky = sc.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0,    '#6aa8c6');
  sky.addColorStop(0.45, '#88bfd4');
  sky.addColorStop(1,    '#b4d6e4');
  sc.fillStyle = sky;
  sc.fillRect(0, 0, W, H);

  function cloudCluster(cx, cy, r) {
    const puffs = [];
    const np = 18 + Math.floor(rng() * 9);
    for (let i = 0; i < np; i++) {
      const angle = rng() * Math.PI * 2;
      const dist  = Math.pow(rng(), 0.65) * r * 1.1;
      puffs.push({
        x: cx + Math.cos(angle) * dist * 1.45,
        y: cy + Math.sin(angle) * dist * 0.58,
        r: r * (0.22 + rng() * 0.42),
      });
    }
    // a few small wisp puffs at the edges
    for (let i = 0; i < 5; i++) {
      puffs.push({
        x: cx + (rng()-0.5) * r * 3.2,
        y: cy + (rng()-0.15) * r * 1.3,
        r: r * (0.07 + rng() * 0.13),
      });
    }

    // shadow layer (down-shifted, cool grey-blue)
    sc.globalAlpha = 0.20;
    sc.fillStyle = '#a8c0d0';
    for (const p of puffs) {
      sc.beginPath(); sc.arc(p.x, p.y + p.r * 0.42, p.r * 1.18, 0, Math.PI*2); sc.fill();
    }

    // lower body: cool shadow tone
    sc.globalAlpha = 0.78;
    sc.fillStyle = '#d4dfe8';
    for (const p of puffs) {
      if (p.y >= cy - r * 0.1) {
        sc.beginPath(); sc.arc(p.x, p.y, p.r, 0, Math.PI*2); sc.fill();
      }
    }

    // main body: warm cream
    sc.globalAlpha = 0.85;
    sc.fillStyle = '#f0ece0';
    for (const p of puffs) {
      sc.beginPath(); sc.arc(p.x, p.y, p.r, 0, Math.PI*2); sc.fill();
    }

    // upper highlight: bright warm-white
    sc.globalAlpha = 0.70;
    sc.fillStyle = '#faf6ee';
    for (const p of puffs) {
      if (p.y < cy + r * 0.15) {
        sc.beginPath(); sc.arc(p.x - p.r*0.10, p.y - p.r*0.18, p.r * 0.65, 0, Math.PI*2); sc.fill();
      }
    }

    // specular white cap
    sc.globalAlpha = 0.55;
    sc.fillStyle = '#ffffff';
    sc.beginPath(); sc.arc(cx + (rng()-0.5)*r*0.25, cy - r*0.22, r*0.38, 0, Math.PI*2); sc.fill();

    sc.globalAlpha = 1;
  }

  const numClouds = 9 + Math.floor(rng() * 4);
  for (let i = 0; i < numClouds; i++) {
    cloudCluster(
      W * (-0.06 + rng() * 1.14),
      H * (0.03  + rng() * 0.70),
      W *  (0.07 + rng() * 0.12)
    );
  }
}

function generateBlobs(lvl) {
  const rng  = seededRng(lvl * 4177 + 888);
  const cols = BLOB_COLS_WORLDS[activeWorld] || BLOB_COLS_WORLDS[0];
  const blobs = [];
  for (let i = 0; i < 6; i++) {
    blobs.push({
      x:     W * (0.05 + rng() * 0.90),
      y:     H * (0.05 + rng() * 0.90),
      r:     W  * (0.18 + rng() * 0.22),
      color: cols[Math.floor(rng() * cols.length)],
      alpha: 0.13 + rng() * 0.11,
    });
  }
  return blobs;
}

const PLAT_TH = Math.round(H * 0.022);  // platform thickness
const PLAT_D  = Math.round(H * 0.014);  // 3-D extrusion depth

function darkenHex(hex, f) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.round(r*(1-f))},${Math.round(g*(1-f))},${Math.round(b*(1-f))})`;
}

function getPlatPal() {
  return activeWorld > 0 ? PLAT_COLORS_ALT[activeWorld - 1] : PLAT_COLORS;
}

function bake(ps) {
  const pal = getPlatPal();
  return ps.map((p, i) => ({ ...p, pvx:0, pvy:0, color: pal[i % pal.length] }));
}

function spawnPlayer(ps) {
  const s = ps[ps.length - 1];
  player = { x:s.x + s.w*0.38, y:s.y - FH, vx:0, vy:0, ground:false, face:1 };
}

function init(lvlData) {
  const origPs = lvlData.ps;
  platforms = bake(origPs);
  door = { ...lvlData.door };
  // Remap platRefs to the baked platform objects
  keyItems = lvlData.keyItems.map(k => {
    const idx = origPs.indexOf(k.platRef);
    return { platRef: platforms[idx], xOffset: k.xOffset, collected: false, anim: null };
  });
  keysCollected = 0; doorBumpTimer = 0;
  bgBlobs = generateBlobs(levelNum);
  bakeSky(levelNum);
  confetti = [];
  drawsLeft = drawLimit(levelNum);
  drawMode = false;
  isDragging = false;
  if (drawBtn) { drawBtn.textContent = `✏ Draw (${drawsLeft})`; drawBtn.disabled = false; drawBtn.style.opacity = '1'; drawBtn.style.background = ''; drawBtn.style.color = ''; drawBtn.style.borderColor = ''; }
  if (typeof canvas !== 'undefined') canvas.style.cursor = 'default';
  spawnPlayer(platforms);
  legAngle = 0; time = 0;
  levelComplete = false; completionTimer = 0; msgAlpha = 0;
  standingPlatform = null;
}

// ── Drawing ───────────────────────────────────────────────────────────────────

function drawBg() {
  if (activeWorld === 0) {
    // Painterly sky — blit the pre-rendered canvas
    if (skyCanvas) ctx.drawImage(skyCanvas, 0, 0);
    else { ctx.fillStyle = '#88bfd4'; ctx.fillRect(0, 0, W, H); }
  } else {
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, W, H);

    const depthGrad = ctx.createLinearGradient(0, 0, 0, H);
    if (activeWorld === 1) {
      depthGrad.addColorStop(0, 'rgba(45,5,0,0.62)');
      depthGrad.addColorStop(1, 'rgba(20,0,0,0.38)');
    } else if (activeWorld === 2) {
      depthGrad.addColorStop(0, 'rgba(0,30,25,0.60)');
      depthGrad.addColorStop(1, 'rgba(0,8,28,0.40)');
    } else if (activeWorld === 3) {
      depthGrad.addColorStop(0, 'rgba(22,0,44,0.62)');
      depthGrad.addColorStop(1, 'rgba(5,0,20,0.38)');
    }
    ctx.fillStyle = depthGrad; ctx.fillRect(0, 0, W, H);

    for (const b of bgBlobs) {
      const g = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
      g.addColorStop(0, hexAlpha(b.color, Math.min(0.55, b.alpha * 1.6)));
      g.addColorStop(1, hexAlpha(b.color, 0));
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
    }
  }

  ctx.fillStyle = activeWorld === 0 ? 'rgba(60,80,100,0.70)' : 'rgba(200,200,200,0.55)';
  ctx.font = '13px "Comic Sans MS", cursive';
  ctx.textAlign = 'left';
  ctx.fillText('Level ' + (levelNum + 1), 16, 20);
}

function rRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y,     x + w, y + r,     r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x,     y + h, x,     y + h - r, r);
  ctx.lineTo(x,     y + r);
  ctx.arcTo(x,     y,     x + r, y,         r);
  ctx.closePath();
}

function drawPlatform(p) {
  const r = PLAT_TH * 0.45;

  // Soft drop shadow
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.22)';
  ctx.shadowBlur  = 10;
  ctx.shadowOffsetX = 3; ctx.shadowOffsetY = 6;
  rRect(p.x, p.y, p.w, PLAT_TH, r);
  ctx.fillStyle = p.color; ctx.fill();
  ctx.restore();

  // Front face — 3-D extrusion below the top surface
  rRect(p.x + 1, p.y + PLAT_TH - r * 0.4, p.w - 2, PLAT_D + r * 0.4, r * 0.25);
  ctx.fillStyle = darkenHex(p.color, 0.32); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.18)'; ctx.lineWidth = 1; ctx.stroke();

  // Top face
  rRect(p.x, p.y, p.w, PLAT_TH, r);
  ctx.fillStyle = p.color; ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.28)'; ctx.lineWidth = 2; ctx.stroke();

  // Top highlight strip
  ctx.strokeStyle = 'rgba(255,255,255,0.55)'; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(p.x + r + 2, p.y + 3);
  ctx.lineTo(p.x + p.w - r - 2, p.y + 3);
  ctx.stroke();

  // Dashed travel path for moving platforms
  if (p.moveX || p.moveY) {
    ctx.strokeStyle = 'rgba(0,0,0,0.12)'; ctx.lineWidth = 1; ctx.setLineDash([5,5]);
    ctx.beginPath();
    if (p.moveX) { ctx.moveTo(p.baseX - p.range, p.y + PLAT_TH/2); ctx.lineTo(p.baseX + p.w + p.range, p.y + PLAT_TH/2); }
    else         { ctx.moveTo(p.x + p.w/2, p.baseY - p.range);      ctx.lineTo(p.x + p.w/2, p.baseY + p.range); }
    ctx.stroke(); ctx.setLineDash([]);
  }
}

function drawDoor(d) {
  const locked = !d.open && keysCollected < 3;
  const ready  = !d.open && keysCollected >= 3;
  const shake  = locked && doorBumpTimer > 0 ? Math.sin(doorBumpTimer * 1.4) * 4 : 0;
  ctx.save();
  ctx.translate(shake, 0);
  ctx.lineCap = 'round';

  function archPath() {
    ctx.beginPath();
    ctx.moveTo(d.x, d.y+d.h);
    ctx.lineTo(d.x, d.y+d.h*0.38);
    ctx.quadraticCurveTo(d.x, d.y, d.x+d.w/2, d.y);
    ctx.quadraticCurveTo(d.x+d.w, d.y, d.x+d.w, d.y+d.h*0.38);
    ctx.lineTo(d.x+d.w, d.y+d.h);
    ctx.closePath();
  }

  // Door drop shadow (gives it depth off the wall)
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.30)';
  ctx.shadowBlur  = 14; ctx.shadowOffsetX = 5; ctx.shadowOffsetY = 8;
  ctx.beginPath();
  ctx.moveTo(d.x, d.y+d.h); ctx.lineTo(d.x, d.y+d.h*0.38);
  ctx.quadraticCurveTo(d.x, d.y, d.x+d.w/2, d.y);
  ctx.quadraticCurveTo(d.x+d.w, d.y, d.x+d.w, d.y+d.h*0.38);
  ctx.lineTo(d.x+d.w, d.y+d.h); ctx.closePath();
  ctx.fillStyle = 'rgba(0,0,0,0.01)'; ctx.fill();
  ctx.restore();

  // Pulsing glow when all keys collected
  if (ready) {
    const pulse = 0.5 + 0.5 * Math.sin(time * 0.07);
    const grd = ctx.createRadialGradient(d.x+d.w/2, d.y+d.h/2, 0, d.x+d.w/2, d.y+d.h/2, d.w*1.8);
    grd.addColorStop(0, `rgba(255,215,0,${0.35*pulse})`);
    grd.addColorStop(1, 'rgba(255,215,0,0)');
    ctx.fillStyle = grd;
    ctx.fillRect(d.x - d.w, d.y - d.h*0.6, d.w*3, d.h*2.2);
  }

  // Body fill
  archPath();
  ctx.fillStyle = d.open ? 'rgba(39,174,96,0.25)' : (d.bodyCol || '#D4956A');
  ctx.fill();

  // Coloured frame
  archPath();
  ctx.strokeStyle = d.open ? '#27AE60' : (d.frameCol || '#1A1A1A');
  ctx.lineWidth = 3;
  ctx.stroke();

  // Knob
  ctx.fillStyle   = d.open ? '#27AE60' : '#FFD700';
  ctx.strokeStyle = d.open ? '#1a8a50' : '#8B6914';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(d.x+d.w*0.72, d.y+d.h*0.62, 4, 0, Math.PI*2); ctx.fill(); ctx.stroke();

  // Padlock when locked
  if (locked) {
    const lx = d.x + d.w*0.72, ly = d.y + d.h*0.72;
    const lw = 9, lh = 7;
    ctx.fillStyle = '#FFD700'; ctx.strokeStyle = '#8B6914'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.roundRect ? ctx.roundRect(lx-lw/2, ly, lw, lh, 2) : ctx.rect(lx-lw/2, ly, lw, lh);
    ctx.fill(); ctx.stroke();
    ctx.strokeStyle = '#8B6914'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(lx, ly, lw*0.37, Math.PI, 0); ctx.stroke();
  }

  // Orbiting stars when ready
  if (ready) {
    for (let i = 0; i < 4; i++) {
      const a  = (i / 4) * Math.PI * 2 + time * 0.036;
      const sx = d.x + d.w/2 + Math.cos(a) * d.w * 1.0;
      const sy = d.y + d.h/2 + Math.sin(a) * d.h * 0.65;
      const al = 0.55 + 0.45 * Math.sin(time * 0.10 + i * 1.6);
      ctx.save();
      ctx.globalAlpha = al;
      ctx.translate(sx, sy);
      ctx.rotate(time * 0.07 + i);
      ctx.fillStyle = '#FFD700'; ctx.strokeStyle = '#8B6914'; ctx.lineWidth = 1;
      ctx.beginPath();
      for (let p = 0; p < 5; p++) {
        const outer = p * Math.PI*2/5 - Math.PI/2;
        const inner = outer + Math.PI/5;
        p === 0 ? ctx.moveTo(Math.cos(outer)*5, Math.sin(outer)*5)
                : ctx.lineTo(Math.cos(outer)*5, Math.sin(outer)*5);
        ctx.lineTo(Math.cos(inner)*2, Math.sin(inner)*2);
      }
      ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.restore();
    }
  }

  ctx.restore();
}

function drawWaterKey() {
  const r   = KEY_R * 1.1;
  const fh  = KEY_R * 3.0;
  const tipY = -fh * 0.58;
  const cenY =  fh * 0.08;

  // Ambient glow
  const glow = ctx.createRadialGradient(0, cenY, 0, 0, cenY, r * 2.2);
  glow.addColorStop(0, 'rgba(80,200,255,0.32)');
  glow.addColorStop(1, 'rgba(0,150,255,0)');
  ctx.fillStyle = glow;
  ctx.beginPath(); ctx.ellipse(0, cenY, r * 2.2, r * 2.2, 0, 0, Math.PI*2); ctx.fill();

  // Drop gradient
  const grad = ctx.createLinearGradient(0, tipY, 0, cenY + r);
  grad.addColorStop(0,    'rgba(180,240,255,0.92)');
  grad.addColorStop(0.45, 'rgba(50,170,230,0.90)');
  grad.addColorStop(1,    'rgba(0,100,200,0.88)');

  // Teardrop path
  ctx.beginPath();
  ctx.moveTo(0, tipY);
  ctx.bezierCurveTo(-r * 0.55, tipY + fh * 0.30, -r, cenY - r * 0.40, -r, cenY);
  ctx.arc(0, cenY, r, Math.PI, 0);
  ctx.bezierCurveTo(r, cenY - r * 0.40, r * 0.55, tipY + fh * 0.30, 0, tipY);
  ctx.closePath();
  ctx.fillStyle = grad; ctx.fill();
  ctx.strokeStyle = 'rgba(0,140,220,0.65)'; ctx.lineWidth = 1.5; ctx.stroke();

  // Highlight
  ctx.fillStyle = 'rgba(255,255,255,0.42)';
  ctx.beginPath();
  ctx.ellipse(-r * 0.28, tipY + fh * 0.22, r * 0.24, r * 0.38, -0.5, 0, Math.PI*2);
  ctx.fill();
}

function drawWaterKeyAnim(t) {
  // Expanding flat ripple rings
  for (let ring = 0; ring < 3; ring++) {
    const delay = ring * 0.22;
    const rt    = Math.max(0, t - delay);
    if (rt <= 0) continue;
    const norm  = Math.min(1, rt / (1 - delay));
    const rx    = KEY_R * (1.0 + norm * 6.5);
    const ry    = rx * 0.36;
    const alpha = (1 - norm) * 0.80;
    const lw    = KEY_R * Math.max(0, 0.85 - norm * 0.78);
    if (lw <= 0 || alpha <= 0) continue;
    ctx.strokeStyle = `rgba(60,190,255,${alpha})`;
    ctx.lineWidth = lw;
    ctx.beginPath();
    ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2);
    ctx.stroke();
  }
  // Flying mini droplets
  for (let d = 0; d < 7; d++) {
    const angle = (d / 7) * Math.PI * 2 + 0.3;
    const spd   = 0.7 + (d % 3) * 0.18;
    const dist  = KEY_R * 4.2 * t * spd;
    const dx    = Math.cos(angle) * dist;
    const dy    = Math.sin(angle) * dist * 0.44 - t * KEY_R * 1.2;
    const dr    = KEY_R * 0.52 * (1 - t);
    const alpha = (1 - t) * 0.90;
    if (dr <= 0 || alpha <= 0) continue;
    const dg = ctx.createRadialGradient(dx - dr * 0.3, dy - dr * 0.3, 0, dx, dy, dr);
    dg.addColorStop(0, `rgba(200,240,255,${alpha})`);
    dg.addColorStop(1, `rgba(30,150,220,${alpha * 0.5})`);
    ctx.fillStyle = dg;
    ctx.beginPath();
    ctx.ellipse(dx, dy, dr, dr * 1.3, angle + Math.PI / 2, 0, Math.PI * 2);
    ctx.fill();
  }
  // Brief central flash
  if (t < 0.28) {
    const fa = (0.28 - t) / 0.28 * 0.65;
    const fr = KEY_R * (1.2 + t * 3.5);
    const fg = ctx.createRadialGradient(0, 0, 0, 0, 0, fr);
    fg.addColorStop(0, `rgba(200,240,255,${fa})`);
    fg.addColorStop(1, 'rgba(50,180,255,0)');
    ctx.fillStyle = fg;
    ctx.beginPath(); ctx.arc(0, 0, fr, 0, Math.PI * 2); ctx.fill();
  }
}

function drawFireKey() {
  const f1 = Math.sin(time * 0.22 + 1.1) * 0.14;
  const f2 = Math.sin(time * 0.37) * 0.09;
  const f3 = Math.sin(time * 0.51 + 2.3) * 0.07;
  const fh = KEY_R * 3.0;
  const fw = KEY_R * 1.4;
  const by = KEY_R * 0.6;

  function flameGrad(tipY, baseAlpha, r, g, b) {
    const grad = ctx.createLinearGradient(0, by, 0, tipY);
    grad.addColorStop(0,   `rgba(${r},${g},${b},${baseAlpha})`);
    grad.addColorStop(0.55, `rgba(${r},${g},${b},${baseAlpha * 0.55})`);
    grad.addColorStop(1,   `rgba(${r},${g},${b},0)`);
    return grad;
  }

  // Ambient glow
  const gr = ctx.createRadialGradient(0, by - fh * 0.35, 0, 0, by - fh * 0.35, fh * 1.0);
  gr.addColorStop(0, 'rgba(255,130,0,0.40)');
  gr.addColorStop(1, 'rgba(255,40,0,0)');
  ctx.fillStyle = gr;
  ctx.beginPath(); ctx.arc(0, by - fh * 0.35, fh * 1.0, 0, Math.PI*2); ctx.fill();

  // Outer flame — fades to transparent at tip
  ctx.fillStyle = flameGrad(by - fh, 0.95, 180, 20, 0);
  ctx.beginPath();
  ctx.moveTo(-fw * 0.85, by);
  ctx.bezierCurveTo(-fw, by - fh * 0.28, -fw * 0.55 + f1 * fw, by - fh * 0.62, f2 * fw * 0.4, by - fh);
  ctx.bezierCurveTo( fw * 0.55 + f1 * fw, by - fh * 0.62,  fw, by - fh * 0.28,  fw * 0.85, by);
  ctx.closePath(); ctx.fill();

  // Mid flame
  ctx.fillStyle = flameGrad(by - fh * 0.82, 0.95, 255, 90, 0);
  ctx.beginPath();
  ctx.moveTo(-fw * 0.60, by);
  ctx.bezierCurveTo(-fw * 0.65, by - fh * 0.28, -fw * 0.38 + f2 * fw, by - fh * 0.58, f1 * fw * 0.35, by - fh * 0.82);
  ctx.bezierCurveTo( fw * 0.38 + f2 * fw, by - fh * 0.58,  fw * 0.65, by - fh * 0.28,  fw * 0.60, by);
  ctx.closePath(); ctx.fill();

  // Inner flame
  ctx.fillStyle = flameGrad(by - fh * 0.62, 0.97, 255, 170, 0);
  ctx.beginPath();
  ctx.moveTo(-fw * 0.38, by);
  ctx.bezierCurveTo(-fw * 0.42, by - fh * 0.22, -fw * 0.22 + f3 * fw, by - fh * 0.46, f1 * fw * 0.25, by - fh * 0.62);
  ctx.bezierCurveTo( fw * 0.22 + f3 * fw, by - fh * 0.46,  fw * 0.42, by - fh * 0.22,  fw * 0.38, by);
  ctx.closePath(); ctx.fill();

  // Core — hottest, fades last
  ctx.fillStyle = flameGrad(by - fh * 0.40, 1.0, 255, 255, 180);
  ctx.beginPath();
  ctx.moveTo(-fw * 0.18, by);
  ctx.bezierCurveTo(-fw * 0.20, by - fh * 0.15, -fw * 0.10 + f2 * fw * 0.3, by - fh * 0.28, f3 * fw * 0.2, by - fh * 0.40);
  ctx.bezierCurveTo( fw * 0.10 + f2 * fw * 0.3, by - fh * 0.28,  fw * 0.20, by - fh * 0.15,  fw * 0.18, by);
  ctx.closePath(); ctx.fill();
}

function drawKey(k) {
  // Finish animation then hide
  if (k.anim !== null && k.anim >= 1) { k.anim = null; return; }
  if (k.collected && k.anim === null) return;

  const kx = k.platRef.x + k.xOffset;
  const animating = k.anim !== null;
  const t = animating ? k.anim : 0;
  if (animating) k.anim = Math.min(1, t + 0.052);

  const ky = k.platRef.y - KEY_FLOAT
           + (animating ? (activeWorld === 2 ? 0 : -t * 38) : Math.sin(time * 0.05 + k.xOffset * 0.1) * 3);

  ctx.save();
  ctx.translate(kx, ky);

  // World II: water drop with spread animation
  if (activeWorld === 2) {
    if (animating) drawWaterKeyAnim(t); else drawWaterKey();
    ctx.restore();
    return;
  }

  ctx.globalAlpha = animating ? 1 - t : 1;

  if (animating) {
    ctx.scale(Math.cos(t * Math.PI * 4), 1 + t * 0.4);
    // Expanding glow
    const gr  = KEY_R * (1.8 + t * 4);
    const grd = ctx.createRadialGradient(0, 0, 0, 0, 0, gr);
    const burstCol = activeWorld === 1 ? '255,110,0' : '255,215,0';
    grd.addColorStop(0, `rgba(${burstCol},${0.85 * (1 - t)})`);
    grd.addColorStop(1, `rgba(${burstCol},0)`);
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(0, 0, gr, 0, Math.PI*2); ctx.fill();
  }

  // Fire key in world I
  if (activeWorld === 1) { drawFireKey(); ctx.restore(); return; }

  // Head
  ctx.fillStyle = '#FFD700'; ctx.strokeStyle = '#8B6914'; ctx.lineWidth = 1.8;
  ctx.beginPath(); ctx.arc(0, 0, KEY_R, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  // Hole
  ctx.fillStyle = '#8B6914';
  ctx.beginPath(); ctx.arc(0, 0, KEY_R*0.38, 0, Math.PI*2); ctx.fill();
  // Shaft
  ctx.fillStyle = '#FFD700'; ctx.strokeStyle = '#8B6914'; ctx.lineWidth = 1.5;
  ctx.fillRect(KEY_R-1, -KEY_W/2, KEY_L, KEY_W);
  ctx.strokeRect(KEY_R-1, -KEY_W/2, KEY_L, KEY_W);
  // Teeth
  ctx.lineWidth = 1;
  ctx.fillRect(KEY_R + KEY_L*0.42, KEY_W/2-1, KEY_W*0.9, KEY_W*1.1);
  ctx.strokeRect(KEY_R + KEY_L*0.42, KEY_W/2-1, KEY_W*0.9, KEY_W*1.1);
  ctx.fillRect(KEY_R + KEY_L*0.68, KEY_W/2-1, KEY_W*0.9, KEY_W*1.1);
  ctx.strokeRect(KEY_R + KEY_L*0.68, KEY_W/2-1, KEY_W*0.9, KEY_W*1.1);

  ctx.restore();
}

function drawKeyHUD() {
  const spacing = KEY_R * 3.4;
  const sx = 70, y = H - 30;
  ctx.font = `${Math.round(H*0.022)}px "Comic Sans MS", cursive`;
  ctx.fillStyle = 'rgba(220,220,220,0.8)';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText('Keys:', sx, y);
  ctx.textAlign = 'right';
  if      (activeWorld === 1) { ctx.fillStyle = '#FF8040'; ctx.fillText(`🔥 ${fireKeys}`,  W - 16, y); }
  else if (activeWorld === 2) { ctx.fillStyle = '#48DBFB'; ctx.fillText(`💧 ${waterKeys}`, W - 16, y); }
  else if (activeWorld === 3) { ctx.fillStyle = '#FFE030'; ctx.fillText(`⚡ ${elecKeys}`,  W - 16, y); }
  else                        { ctx.fillStyle = '#FFD700'; ctx.fillText(`🗝 ${bankKeys}`,  W - 16, y); }
  ctx.textAlign = 'left';
  ctx.fillStyle = 'rgba(220,220,220,0.8)';
  for (let i = 0; i < 3; i++) {
    const cx = sx + 62 + i * spacing;
    const got = i < keysCollected;
    ctx.fillStyle   = got ? (activeWorld === 2 ? '#48DBFB' : '#FFD700') : 'rgba(0,0,0,0.1)';
    ctx.strokeStyle = got ? (activeWorld === 2 ? '#0097A7' : '#8B6914') : 'rgba(0,0,0,0.25)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(cx, y, KEY_R, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    if (got) {
      ctx.fillStyle = '#8B6914';
      ctx.beginPath(); ctx.arc(cx, y, KEY_R*0.38, 0, Math.PI*2); ctx.fill();
    }
  }
  ctx.textBaseline = 'alphabetic';
}

function drawDoorBumpMsg() {
  if (doorBumpTimer <= 0 || !door) return;
  const alpha = Math.min(1, doorBumpTimer / 20);
  const needed = 3 - keysCollected;
  const text = needed === 1 ? 'Need 1 more key!' : `Need ${needed} more keys!`;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.font = `bold ${Math.round(H*0.025)}px "Comic Sans MS", cursive`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  ctx.fillStyle = '#C0392B';
  ctx.fillText(text, door.x + door.w/2, door.y - 8);
  ctx.restore();
  ctx.textBaseline = 'alphabetic';
}

function spawnConfetti() {
  const cols = ['#E74C3C','#E67E22','#F1C40F','#2ECC71','#3498DB','#9B59B6','#E91E8C','#1ABC9C','#FFD700'];
  for (let i = 0; i < 120; i++) {
    const angle = -Math.PI * (0.15 + Math.random() * 0.70);
    const spd   = 3 + Math.random() * 12;
    confetti.push({
      x:    player.x + (Math.random()-0.5) * 40,
      y:    player.y + FH * 0.3,
      vx:   Math.cos(angle) * spd,
      vy:   Math.sin(angle) * spd,
      col:  cols[Math.floor(Math.random() * cols.length)],
      w:    5 + Math.random() * 8,
      h:    3 + Math.random() * 5,
      rot:  Math.random() * Math.PI * 2,
      rotV: (Math.random()-0.5) * 0.30,
      life: 1.0,
    });
  }
}

function tickConfetti() {
  for (const p of confetti) {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.30; p.vx *= 0.98;
    p.rot += p.rotV;
    p.life -= 0.007;
  }
  confetti = confetti.filter(p => p.life > 0);
}

function drawConfetti() {
  for (const p of confetti) {
    ctx.save();
    ctx.globalAlpha = Math.min(1, p.life / 0.20);
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.fillStyle = p.col;
    ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

function drawPlayerShadow() {
  // Find nearest platform surface below player's feet
  let nearY = H, minDist = H;
  const feet = player.y + FH;
  for (const p of platforms) {
    const dist = p.y - feet;
    if (dist >= -2 && dist < minDist && player.x + FW/2 > p.x && player.x - FW/2 < p.x + p.w) {
      minDist = dist; nearY = p.y;
    }
  }
  const dist   = Math.max(0, nearY - feet);
  const maxD   = H * 0.35;
  if (dist > maxD) return;
  const fade   = 1 - dist / maxD;
  const scaleX = 0.4 + 0.6 * fade;
  ctx.save();
  ctx.globalAlpha = 0.22 * fade;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(player.x, nearY + 2, FW * 3.0 * scaleX, 5 * fade + 1, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawFigure(x, y, la, f, charId, staticPose) {
  ctx.save();
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';

  const ch     = CHARS.find(c => c.id === (charId || activeChar)) || CHARS[0];
  const isMale = ch.male || false;
  const COL   = '#f5dec1';
  const LIGHT = '#fff6ec';
  const SHAD  = '#c8966e';
  const HAIR  = ch.hair;
  const HLIT  = ch.hlit;
  const HDARK = ch.hdrk;
  const SHOE  = ch.shoe;
  const LINE  = '#1A1A1A';
  const lw    = Math.max(1.5, Math.round(H * 0.0028));

  const headW = Math.round(HR * 2.10);
  const headH = HR * 2;
  const torsoW= Math.round(HR * 2.00);
  const armW  = Math.round(HR * 0.62);
  const armH  = Math.round(BH * 0.82);
  const legW  = Math.round(HR * 0.78);
  const footW = Math.round(HR * 1.02);
  const footH = Math.round(LH * 0.20);
  const rHead = Math.round(headW * 0.40);
  const rBody = Math.round(HR   * 0.28);

  const torsoY = y + headH;
  const hipY   = torsoY + BH;

  // Animation
  const isAir  = staticPose ? false : !player.ground;
  const stride = staticPose ? 0 : Math.sin(la);
  const swing  = isAir ? 0 : stride * 0.52;   // legs

  // Arms: raise high when airborne, alternate swing when running
  const JUMP_ARM  = 2.10;
  const lArmAngle = isAir ? -JUMP_ARM :  stride * 0.82;
  const rArmAngle = isAir ?  JUMP_ARM : -stride * 0.82;

  function skinGrad(bx, by, bw, bh) {
    const g = ctx.createLinearGradient(bx, by, bx + bw * 0.82, by + bh * 0.82);
    g.addColorStop(0,    LIGHT);
    g.addColorStop(0.45, COL);
    g.addColorStop(1,    SHAD);
    return g;
  }

  function box(bx, by, bw, bh, br, fill) {
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(bx, by, bw, bh, br);
    else ctx.rect(bx, by, bw, bh);
    ctx.fillStyle = (fill === COL) ? skinGrad(bx, by, bw, bh) : fill;
    ctx.fill();
    ctx.strokeStyle = LINE; ctx.lineWidth = lw; ctx.stroke();
  }

  function drawLeg(pivX, angle, legCol) {
    ctx.save();
    ctx.translate(pivX, hipY);
    ctx.rotate(angle);
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(-footW / 2, LH - footH, footW, footH * 1.4, rBody);
    else ctx.rect(-footW / 2, LH - footH, footW, footH * 1.4);
    ctx.fillStyle = SHOE; ctx.fill();
    ctx.strokeStyle = LINE; ctx.lineWidth = lw; ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.beginPath();
    ctx.ellipse(-footW * 0.20, LH - footH * 0.55, footW * 0.17, footH * 0.32, 0, 0, Math.PI * 2);
    ctx.fill();
    box(-legW / 2, 0, legW, LH, rBody, legCol !== undefined ? legCol : COL);
    ctx.restore();
  }

  function drawArm(pivX, pivY, angle) {
    ctx.save();
    ctx.translate(pivX, pivY);
    ctx.rotate(angle);
    box(-armW / 2, 0, armW, armH, rBody, COL);
    ctx.restore();
  }

  const lArmPiv = x - torsoW / 2;
  const rArmPiv = x + torsoW / 2;
  const armPivY = torsoY + BH * 0.04;
  const lLegPiv = x - legW * 0.62;
  const rLegPiv = x + legW * 0.62;

  // Hair
  const hairW    = Math.round(headW * 0.36);
  const hairLen  = Math.round(headH + BH * 0.50);  // medium length
  const hairPivY = y + headH * 0.18;
  // Strands pivot at the head edges so they hang off the sides
  const lHairPivX = x - headW / 2;
  const rHairPivX = x + headW / 2;
  const idleWave  = Math.sin(time * 0.040) * 0.055;
  const hairFlow  = isAir ? -f * 0.11 : -f * Math.abs(stride) * 0.22;
  const lHairRot  = -0.06 + hairFlow + idleWave;
  const rHairRot  =  0.06 + hairFlow - idleWave;

  function drawHairStrand(pivX, angle, flipGrad) {
    ctx.save();
    ctx.translate(pivX, hairPivY);
    ctx.rotate(angle);
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(-hairW / 2, 0, hairW, hairLen,
      [hairW * 0.45, hairW * 0.45, hairW * 0.35, hairW * 0.35]);
    else ctx.rect(-hairW / 2, 0, hairW, hairLen);
    const gx0 = flipGrad ?  hairW / 2 : -hairW / 2;
    const gx1 = flipGrad ? -hairW / 2 :  hairW / 2;
    const hg  = ctx.createLinearGradient(gx0, 0, gx1, 0);
    hg.addColorStop(0,   HLIT);
    hg.addColorStop(0.4, HAIR);
    hg.addColorStop(1,   HDARK);
    ctx.fillStyle = hg;
    ctx.fill();
    ctx.restore();
  }

  // ── 1. Hair strands ───────────────────────────────────────────────────────
  if (!isMale) {
    drawHairStrand(lHairPivX, lHairRot, true);
    drawHairStrand(rHairPivX, rHairRot, false);
  }

  // Dress palette from character
  const DRESS  = ch.dress;
  const DLIT   = ch.dlit;
  const DDRK   = ch.ddrk;
  const BELT   = ch.belt;

  const beltY  = torsoY + BH * 0.54;
  const skirtBW= Math.round(torsoW * 1.76);
  const skirtH = Math.round(LH * 0.82);
  const beltH  = Math.max(2, Math.round(BH * 0.11));

  // ── 2. Both legs – behind the dress ──────────────────────────────────────
  const legFill = isMale ? ch.pants : undefined;
  if (f > 0) drawLeg(rLegPiv, -swing, legFill);   // back leg
  else       drawLeg(lLegPiv,  swing, legFill);
  if (f > 0) drawLeg(lLegPiv,  swing, legFill);   // front leg
  else       drawLeg(rLegPiv, -swing, legFill);

  if (!isMale) {
    // ── 3. Dress bodice ───────────────────────────────────────────────────
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(x - torsoW/2, torsoY, torsoW, beltY - torsoY + beltH/2,
      [rBody, rBody, 0, 0]);
    else ctx.rect(x - torsoW/2, torsoY, torsoW, beltY - torsoY + beltH/2);
    const bodGrad = ctx.createLinearGradient(x - torsoW/2, torsoY, x + torsoW/2, torsoY);
    bodGrad.addColorStop(0,   DLIT);
    bodGrad.addColorStop(0.5, DRESS);
    bodGrad.addColorStop(1,   DDRK);
    ctx.fillStyle = bodGrad; ctx.fill();
    ctx.strokeStyle = LINE; ctx.lineWidth = lw; ctx.stroke();

    // ── 4. Dress skirt – A-line trapezoid ─────────────────────────────────
    const hemR = Math.round(skirtBW * 0.06);
    ctx.beginPath();
    ctx.moveTo(x - torsoW/2, beltY);
    ctx.lineTo(x + torsoW/2, beltY);
    ctx.lineTo(x + skirtBW/2 - hemR, beltY + skirtH);
    ctx.arcTo( x + skirtBW/2, beltY + skirtH, x + skirtBW/2, beltY + skirtH - hemR, hemR);
    ctx.lineTo(x + skirtBW/2, beltY + skirtH);
    ctx.lineTo(x - skirtBW/2 + hemR, beltY + skirtH);
    ctx.arcTo( x - skirtBW/2, beltY + skirtH, x - skirtBW/2, beltY + skirtH - hemR, hemR);
    ctx.closePath();
    const sktGrad = ctx.createLinearGradient(x - skirtBW/2, beltY, x + skirtBW/2, beltY + skirtH);
    sktGrad.addColorStop(0,   DLIT);
    sktGrad.addColorStop(0.5, DRESS);
    sktGrad.addColorStop(1,   DDRK);
    ctx.fillStyle = sktGrad; ctx.fill();
    ctx.strokeStyle = LINE; ctx.lineWidth = lw; ctx.stroke();

    // ── 5. Belt ───────────────────────────────────────────────────────────
    const beltW = torsoW + Math.round(lw * 1.5);
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(x - beltW/2, beltY - beltH/2, beltW, beltH, beltH * 0.45);
    else ctx.rect(x - beltW/2, beltY - beltH/2, beltW, beltH);
    ctx.fillStyle = BELT; ctx.fill();
    ctx.strokeStyle = 'rgba(160,155,140,0.55)'; ctx.lineWidth = lw * 0.45; ctx.stroke();
  } else {
    // ── Male outfit: shirt + hip strip ────────────────────────────────────
    const SHIRT = ch.shirt; const SLIT = ch.slit; const SDRK = ch.sdrk;
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(x - torsoW/2, torsoY, torsoW, BH, [rBody, rBody, 2, 2]);
    else ctx.rect(x - torsoW/2, torsoY, torsoW, BH);
    const shGrad = ctx.createLinearGradient(x - torsoW/2, torsoY, x + torsoW/2, torsoY + BH);
    shGrad.addColorStop(0, SLIT);
    shGrad.addColorStop(0.5, SHIRT);
    shGrad.addColorStop(1, SDRK);
    ctx.fillStyle = shGrad; ctx.fill();
    ctx.strokeStyle = LINE; ctx.lineWidth = lw; ctx.stroke();
    // Hip strip bridges shirt hem to pants tops
    const hipStrip = Math.round(BH * 0.16);
    ctx.fillStyle = ch.pants;
    ctx.beginPath();
    ctx.rect(x - torsoW/2 - 1, hipY - Math.round(hipStrip * 0.3), torsoW + 2, hipStrip);
    ctx.fill();
  }

  // ── 6. Both arms – in front of outfit ────────────────────────────────────
  drawArm(lArmPiv, armPivY, lArmAngle);
  drawArm(rArmPiv, armPivY, rArmAngle);

  // ── 6. Head ───────────────────────────────────────────────────────────────
  box(x - headW/2, y, headW, headH, rHead, COL);
  ctx.fillStyle = 'rgba(255,255,255,0.26)';
  ctx.beginPath();
  ctx.ellipse(x - headW * 0.12, y + headH * 0.30, headW * 0.22, headH * 0.14, -0.38, 0, Math.PI * 2);
  ctx.fill();

  // ── 7. Hair scalp cap – fills top of head so scalp is covered ─────────────
  const capGrad = ctx.createLinearGradient(x - headW/2, y, x + headW/2, y);
  capGrad.addColorStop(0,   HLIT);
  capGrad.addColorStop(0.5, HAIR);
  capGrad.addColorStop(1,   HDARK);
  ctx.fillStyle = capGrad;
  ctx.beginPath();
  if (ctx.roundRect) ctx.roundRect(x - headW/2, y, headW, headH * 0.44,
    [rHead, rHead, headW * 0.12, headW * 0.12]);
  else ctx.rect(x - headW/2, y, headW, headH * 0.44);
  ctx.fill();

  // ── 8. Face ───────────────────────────────────────────────────────────────
  const eR    = Math.max(2, HR * 0.19);
  const eyeY  = y + headH * 0.61;
  const lEyeX = x - headW * 0.188;
  const rEyeX = x + headW * 0.188;

  // Eyebrows (same height, slight arch)
  const browY = eyeY - eR * 2.3;
  ctx.strokeStyle = HAIR; ctx.lineWidth = Math.max(1, eR * 0.72); ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(lEyeX - eR, browY + eR * 0.20);
  ctx.quadraticCurveTo(lEyeX, browY - eR * 0.15, lEyeX + eR, browY + eR * 0.10);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(rEyeX - eR, browY + eR * 0.10);
  ctx.quadraticCurveTo(rEyeX, browY - eR * 0.15, rEyeX + eR, browY + eR * 0.20);
  ctx.stroke();

  // Eyes: iris → pupil → catchlight
  ctx.fillStyle = '#2a1208';
  ctx.beginPath(); ctx.arc(lEyeX, eyeY, eR,       0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(rEyeX, eyeY, eR,       0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#060200';
  ctx.beginPath(); ctx.arc(lEyeX, eyeY, eR * 0.56, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(rEyeX, eyeY, eR * 0.56, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.90)';
  const cl = eR * 0.30;
  ctx.beginPath(); ctx.arc(lEyeX + cl * 0.5, eyeY - cl * 0.6, cl, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(rEyeX + cl * 0.5, eyeY - cl * 0.6, cl, 0, Math.PI * 2); ctx.fill();

  // Nose (two soft nostril dots)
  const noseY = eyeY + eR * 2.1;
  ctx.fillStyle = 'rgba(185,115,85,0.50)';
  ctx.beginPath(); ctx.arc(x - headW * 0.055, noseY, eR * 0.28, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + headW * 0.055, noseY, eR * 0.28, 0, Math.PI * 2); ctx.fill();

  // Smile (centred)
  ctx.strokeStyle = '#7a3820'; ctx.lineWidth = Math.max(1, HR * 0.12); ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.arc(x, eyeY + eR * 3.3, headW * 0.13, 0.28, Math.PI - 0.28);
  ctx.stroke();

  ctx.restore();
}

function drawShop() {
  if (!shopOpen) return;

  // World card color themes indexed by ch.world (1/2/3)
  const WC = [null,
    { bg:'#1a0800', bgOwn:'#2a1200', brd:'#e74c3c', brdOwn:'#ff6040' },
    { bg:'#001808', bgOwn:'#002010', brd:'#1abc9c', brdOwn:'#2adaa8' },
    { bg:'#0a0018', bgOwn:'#140028', brd:'#9b59b6', brdOwn:'#bf79d8' },
  ];

  ctx.fillStyle = 'rgba(0,0,0,0.78)';
  ctx.fillRect(0, 0, W, H);

  const pw  = Math.min(Math.round(W * 0.92), 780);
  const ph  = Math.min(Math.round(H * 0.92), 520);
  const px  = Math.round((W - pw) / 2);
  const py  = Math.round((H - ph) / 2);
  const pr  = 14;

  // Panel
  ctx.fillStyle = '#0d1530';
  ctx.beginPath();
  if (ctx.roundRect) ctx.roundRect(px, py, pw, ph, pr);
  else ctx.rect(px, py, pw, ph);
  ctx.fill();
  ctx.strokeStyle = '#3a4880'; ctx.lineWidth = 2;
  ctx.beginPath();
  if (ctx.roundRect) ctx.roundRect(px, py, pw, ph, pr);
  else ctx.rect(px, py, pw, ph);
  ctx.stroke();

  // Title
  const titleH = 42;
  ctx.font = `bold ${Math.round(H * 0.030)}px "Comic Sans MS", cursive`;
  ctx.fillStyle = '#ffffff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('✨ Character Shop', W / 2, py + titleH / 2);

  // Bank keys / world currencies
  const _ty = py + titleH / 2;
  ctx.textAlign = 'right';
  if (shopTab === 'world') {
    ctx.font = `bold ${Math.round(H * 0.021)}px "Comic Sans MS", cursive`;
    ctx.fillStyle = '#FF8040'; ctx.fillText(`🔥 ${fireKeys}`,  px + pw - 160, _ty);
    ctx.fillStyle = '#48DBFB'; ctx.fillText(`💧 ${waterKeys}`, px + pw - 95,  _ty);
    ctx.fillStyle = '#FFE030'; ctx.fillText(`⚡ ${elecKeys}`,  px + pw - 46,  _ty);
  } else {
    ctx.font = `bold ${Math.round(H * 0.025)}px "Comic Sans MS", cursive`;
    ctx.fillStyle = '#FFD700'; ctx.fillText(`🗝 ${bankKeys}`, px + pw - 46, _ty);
  }

  // Close button
  shopBtnRects = [{ type:'close', x: px + pw - 34, y: py + 8, w: 26, h: 26 }];
  ctx.fillStyle = '#c03030';
  ctx.beginPath(); ctx.arc(px + pw - 21, py + 21, 13, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = `bold 15px sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('×', px + pw - 21, py + 21);

  // Tab bar
  const tabH  = 32;
  const tabY  = py + titleH + 7;
  const TABS  = [['girls','♀ Girls'], ['boys','♂ Boys'], ['world','🌍 Worlds']];
  const tabTW = Math.min(110, Math.round((pw - 32) / 3));
  const tabsX = px + Math.round((pw - tabTW * 3 - 8) / 2);
  for (let t = 0; t < TABS.length; t++) {
    const [tid, tlabel] = TABS[t];
    const act = shopTab === tid;
    const tx  = tabsX + t * (tabTW + 4);
    ctx.fillStyle = act ? '#2a4a8a' : '#0d1a30';
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(tx, tabY, tabTW, tabH, 8);
    else ctx.rect(tx, tabY, tabTW, tabH);
    ctx.fill();
    ctx.strokeStyle = act ? '#6a90ff' : '#3a4880'; ctx.lineWidth = act ? 2 : 1;
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(tx, tabY, tabTW, tabH, 8);
    else ctx.rect(tx, tabY, tabTW, tabH);
    ctx.stroke();
    ctx.fillStyle = act ? '#ffffff' : '#7080a0';
    ctx.font = `bold ${Math.round(H * 0.018)}px "Comic Sans MS", cursive`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(tlabel, tx + tabTW / 2, tabY + tabH / 2);
    shopBtnRects.push({ type:'tab', tab: tid, x: tx, y: tabY, w: tabTW, h: tabH });
  }

  // Cards area (full height under tabs)
  const cardsY = tabY + tabH + 10;
  const rowH   = ph - (cardsY - py) - 10;

  let visChars;
  if (shopTab === 'girls')     visChars = CHARS.filter(c => !c.male && !c.world);
  else if (shopTab === 'boys') visChars = CHARS.filter(c =>  c.male && !c.world);
  else                         visChars = CHARS.filter(c =>  c.world);

  const n      = visChars.length;
  const gap    = 10;
  const cardW  = Math.floor((pw - 24 - gap * (n - 1)) / n);
  const cardH2 = rowH - 2;
  const prevSc = Math.min(2.4, (cardH2 - 88) / FH);
  const prevH  = Math.round(FH * prevSc);
  const startX = px + 12;

  for (let i = 0; i < n; i++) {
    const ch    = visChars[i];
    const owned = ownedChars.has(ch.id);
    const sel   = ch.id === activeChar;
    const cx    = startX + i * (cardW + gap);
    const wc    = ch.world ? WC[ch.world] : null;

    ctx.fillStyle = sel ? '#1a3a6a'
                  : wc  ? (owned ? wc.bgOwn : wc.bg)
                        : (owned ? '#162040' : '#101828');
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(cx, cardsY, cardW, cardH2, 8);
    else ctx.rect(cx, cardsY, cardW, cardH2);
    ctx.fill();
    ctx.strokeStyle = sel ? '#6a90ff'
                    : wc  ? (owned ? wc.brdOwn : wc.brd)
                           : (owned ? '#3a4880' : '#232840');
    ctx.lineWidth = sel ? 2 : 1;
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(cx, cardsY, cardW, cardH2, 8);
    else ctx.rect(cx, cardsY, cardW, cardH2);
    ctx.stroke();

    if (ch.world) {
      ctx.font = `${Math.round(H * 0.022)}px sans-serif`;
      ctx.textAlign = 'right'; ctx.textBaseline = 'top';
      ctx.fillText(WORLD_META[ch.world - 1].icon, cx + cardW - 5, cardsY + 4);
    }

    ctx.fillStyle = '#ffffff';
    ctx.font = `bold ${Math.round(H * 0.020)}px "Comic Sans MS", cursive`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillText(ch.name, cx + cardW / 2, cardsY + 6);

    const previewCY = cardsY + 26;
    ctx.save();
    ctx.beginPath(); ctx.rect(cx + 2, previewCY, cardW - 4, prevH + 4); ctx.clip();
    ctx.translate(cx + cardW / 2, previewCY);
    ctx.scale(prevSc, prevSc);
    drawFigure(0, 0, 0, 1, ch.id, true);
    ctx.restore();

    if (!owned && bankKeys < ch.price) {
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.beginPath();
      if (ctx.roundRect) ctx.roundRect(cx + 2, previewCY, cardW - 4, prevH + 4, 4);
      else ctx.rect(cx + 2, previewCY, cardW - 4, prevH + 4);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.font = `${Math.round(H * 0.028)}px sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('🔒', cx + cardW / 2, previewCY + prevH / 2);
    }

    const cc     = charCurr(ch);
    const priceY = previewCY + prevH + 5;
    ctx.font = `bold ${Math.round(H * 0.018)}px "Comic Sans MS", cursive`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    if (ch.price === 0) {
      ctx.fillStyle = '#88dd88'; ctx.fillText('Free', cx + cardW / 2, priceY);
    } else if (owned) {
      ctx.fillStyle = '#88dd88'; ctx.fillText('Owned ✓', cx + cardW / 2, priceY);
    } else {
      ctx.fillStyle = cc.count >= ch.price ? '#FFD700' : '#888888';
      ctx.fillText(`${cc.icon} ${ch.price}`, cx + cardW / 2, priceY);
    }

    const btnH = 24;
    const btnY = cardsY + cardH2 - btnH - 5;
    const btnX = cx + 6;
    const btnW = cardW - 12;

    let bgCol, label;
    if (sel)                       { bgCol = '#1a4030'; label = '✓ Equipped'; }
    else if (owned)                { bgCol = '#1a4870'; label = 'Equip'; }
    else if (cc.count >= ch.price) { bgCol = '#1a6030'; label = 'Buy'; }
    else                           { bgCol = '#222233'; label = `Need ${ch.price} ${cc.icon}`; }

    ctx.fillStyle = bgCol;
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(btnX, btnY, btnW, btnH, 5);
    else ctx.rect(btnX, btnY, btnW, btnH);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.18)'; ctx.lineWidth = 1;
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(btnX, btnY, btnW, btnH, 5);
    else ctx.rect(btnX, btnY, btnW, btnH);
    ctx.stroke();

    ctx.fillStyle = sel ? '#aaaaaa' : '#ffffff';
    ctx.font = `bold ${Math.round(H * 0.017)}px "Comic Sans MS", cursive`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(label, btnX + btnW / 2, btnY + btnH / 2);

    if (!sel) {
      shopBtnRects.push({
        type: owned ? 'equip' : (cc.count >= ch.price ? 'buy' : 'locked'),
        id: ch.id, price: ch.price, world: ch.world || 0,
        x: btnX, y: btnY, w: btnW, h: btnH
      });
    }
  }

  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
}

function drawGameOver() {
  if (!gameOver) return;
  ctx.save();
  ctx.globalAlpha = gameOverAlpha * 0.55;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = gameOverAlpha;

  const msg = 'You lost..';
  ctx.font = 'bold 72px "Comic Sans MS", cursive';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  ctx.shadowColor = '#000';
  ctx.shadowBlur = 18;
  ctx.fillStyle = '#fff';
  ctx.fillText(msg, W/2, H/2 - 18);
  ctx.shadowBlur = 0;

  const secsLeft = Math.ceil((GAME_OVER_DELAY - gameOverTimer) / 60);
  ctx.font = 'bold 22px "Comic Sans MS", cursive';
  ctx.fillStyle = 'rgba(255,255,255,0.72)';
  ctx.fillText('Restarting in ' + secsLeft + '...', W/2, H/2 + 54);

  ctx.restore();
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
}

function drawMessage() {
  if (!levelComplete) return;
  msgAlpha = Math.min(1, msgAlpha + 0.04);
  ctx.save();
  ctx.globalAlpha = msgAlpha;
  const bw=500, bh=52, bx=W/2-bw/2, by=14;
  ctx.fillStyle = '#27AE60';
  if (ctx.roundRect) ctx.roundRect(bx, by, bw, bh, 8);
  else               ctx.rect(bx, by, bw, bh);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 21px "Comic Sans MS", cursive';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('Congrats! Next Level awaits..', W/2, by+bh/2);
  ctx.restore();
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
}

// ── Audio ────────────────────────────────────────────────────────────────────

let sfxCtx = null;
function getSfx() {
  if (!sfxCtx) sfxCtx = new (window.AudioContext || window.webkitAudioContext)();
  return sfxCtx;
}

function playJump() {
  try {
    const ac = getSfx();
    const osc = ac.createOscillator();
    const g   = ac.createGain();
    osc.connect(g); g.connect(ac.destination);
    osc.type = 'square';
    osc.frequency.setValueAtTime(160, ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(520, ac.currentTime + 0.10);
    g.gain.setValueAtTime(0.25, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.14);
    osc.start(ac.currentTime);
    osc.stop(ac.currentTime + 0.14);
  } catch(e) {}
}

function playPickup() {
  try {
    const ac = getSfx();
    const osc = ac.createOscillator();
    const g   = ac.createGain();
    osc.connect(g); g.connect(ac.destination);
    osc.type = 'square';
    osc.frequency.setValueAtTime(660, ac.currentTime);
    osc.frequency.setValueAtTime(990, ac.currentTime + 0.06);
    g.gain.setValueAtTime(0.18, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.18);
    osc.start(ac.currentTime);
    osc.stop(ac.currentTime + 0.18);
  } catch(e) {}
}

function playAllKeys() {
  try {
    const ac = getSfx();
    [523, 659, 784, 1047].forEach((freq, i) => {
      const osc = ac.createOscillator(), g = ac.createGain();
      osc.connect(g); g.connect(ac.destination);
      osc.type = 'square';
      const t = ac.currentTime + i * 0.10;
      osc.frequency.setValueAtTime(freq, t);
      g.gain.setValueAtTime(0.20, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.13);
      osc.start(t); osc.stop(t + 0.13);
    });
  } catch(e) {}
}

function playLevelComplete() {
  try {
    const ac = getSfx();
    [392, 523, 659, 523, 784, 1047].forEach((freq, i) => {
      const osc = ac.createOscillator(), g = ac.createGain();
      osc.connect(g); g.connect(ac.destination);
      osc.type = 'square';
      const t = ac.currentTime + i * 0.11;
      osc.frequency.setValueAtTime(freq, t);
      g.gain.setValueAtTime(0.22, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
      osc.start(t); osc.stop(t + 0.14);
    });
  } catch(e) {}
}

// ── Platform movement ─────────────────────────────────────────────────────────

function updatePlatforms() {
  for (const p of platforms) {
    const ox=p.x, oy=p.y;
    if (p.moveX) p.x = p.baseX + Math.sin(time*p.speed)*p.range;
    if (p.moveY) p.y = p.baseY + Math.sin(time*p.speed + (p.phase||0))*p.range;
    p.pvx = p.x - ox;
    p.pvy = p.y - oy;
  }
}

// ── Physics ───────────────────────────────────────────────────────────────────

function update() {
  if (worldSelectOpen) return;
  time++;
  if (lives < 3) {
    lifeTimer++;
    if (lifeTimer >= LIFE_RESET) { lives++; lifeTimer = 0; }
  }

  if (gameOver) {
    gameOverTimer++;
    gameOverAlpha = Math.min(1, gameOverAlpha + 0.03);
    if (gameOverTimer >= GAME_OVER_DELAY) {
      gameOver = false; gameOverAlpha = 0;
      lives = 3; lifeTimer = 0;
      levelNum = 0;
      init(getLevel(0));
    }
    return;
  }

  if (levelComplete) {
    completionTimer++;
    if (completionTimer > 165) {
      levelNum++;
      if (levelNum > maxLevelReached) {
        maxLevelReached = levelNum;
        localStorage.setItem('maxLevel', maxLevelReached);
        for (let wi = 0; wi < WORLD_UNLOCKS.length; wi++) {
          if (maxLevelReached === WORLD_UNLOCKS[wi] - 1) {
            unlockBannerWorld = wi + 1;
            unlockBannerTimer = 1;
            document.getElementById('remix-btn').style.display = 'inline-block';
            break;
          }
        }
      }
      init(getLevel(levelNum));
    }
    return;
  }

  updatePlatforms();

  const L = keys['ArrowLeft']  || keys['KeyA'];
  const R = keys['ArrowRight'] || keys['KeyD'];
  const J = keys['Space'] || keys['ArrowUp'] || keys['KeyW'];

  if      (L) { player.vx = -SPEED; player.face = -1; }
  else if (R) { player.vx =  SPEED; player.face =  1; }
  else          player.vx *= 0.78;

  if (J && player.ground) { player.vy = JUMP; playJump(); }
  player.vy += GRAV;

  const prevFeet = player.y + FH;
  player.y += player.vy;
  player.x += player.vx;

  // Carry player with the platform they're standing on
  if (standingPlatform) {
    player.x += standingPlatform.pvx || 0;
    player.y += standingPlatform.pvy || 0;
  }

  player.x = Math.max(FW/2, Math.min(W - FW/2, player.x));

  player.ground = false; standingPlatform = null;
  const currFeet = player.y + FH;

  for (const p of platforms) {
    if (player.x+FW/2 > p.x+3 && player.x-FW/2 < p.x+p.w-3) {
      if (player.vy >= 0 && prevFeet <= p.y+2 && currFeet >= p.y) {
        player.y = p.y - FH; player.vy = 0;
        player.ground = true; standingPlatform = p; break;
      }
    }
  }

  if (player.y > H + 60) {
    lives--;
    if (lives <= 0) {
      gameOver = true; gameOverTimer = 0; gameOverAlpha = 0;
      player.y = H + 200; // keep off-screen during countdown
    } else {
      spawnPlayer(platforms);
      for (const k of keyItems) { k.collected = false; k.anim = null; }
      keysCollected = 0; doorBumpTimer = 0;
    }
  }

  if (Math.abs(player.vx) > 0.5) legAngle += 0.17*(player.vx>0?1:-1);
  else                             legAngle *= 0.82;

  // Key collection
  for (const k of keyItems) {
    if (k.collected) continue;
    const kx = k.platRef.x + k.xOffset;
    const ky = k.platRef.y - KEY_FLOAT;
    if (Math.abs(player.x - kx) < FW * 2.5 && Math.abs((player.y + FH*0.5) - ky) < FH * 0.75) {
      k.collected = true; k.anim = 0; keysCollected++;
      if      (activeWorld === 1) { fireKeys++;  localStorage.setItem('pf_fireKeys',  fireKeys); }
      else if (activeWorld === 2) { waterKeys++; localStorage.setItem('pf_waterKeys', waterKeys); }
      else if (activeWorld === 3) { elecKeys++;  localStorage.setItem('pf_elecKeys',  elecKeys); }
      else                        { bankKeys++;  localStorage.setItem('pf_bankKeys',  bankKeys); }
      if (keysCollected === 3) playAllKeys(); else playPickup();
    }
  }

  if (doorBumpTimer > 0) doorBumpTimer--;

  // Door trigger — only opens when all 3 keys collected
  if (door && !door.open) {
    if (player.x+FW/2 > door.x+5 && player.x-FW/2 < door.x+door.w-5
     && player.y+FH >= door.platY-4 && player.y+FH <= door.platY+8) {
      if (keysCollected >= 3) {
        door.open = true; levelComplete = true; playLevelComplete(); spawnConfetti();
      } else if (doorBumpTimer === 0) {
        doorBumpTimer = 50;
      }
    }
  }
}

// ── Lives HUD ────────────────────────────────────────────────────────────────

function heartPath(cx, cy, s) {
  ctx.beginPath();
  ctx.moveTo(cx, cy + s*0.28);
  ctx.bezierCurveTo(cx, cy, cx - s*0.5, cy, cx - s*0.5, cy + s*0.32);
  ctx.bezierCurveTo(cx - s*0.5, cy + s*0.64, cx, cy + s*0.90, cx, cy + s);
  ctx.bezierCurveTo(cx, cy + s*0.90, cx + s*0.5, cy + s*0.64, cx + s*0.5, cy + s*0.32);
  ctx.bezierCurveTo(cx + s*0.5, cy, cx, cy, cx, cy + s*0.28);
  ctx.closePath();
}

function drawLivesHUD() {
  const hs  = Math.round(H * 0.026);   // heart size
  const gap = Math.round(hs * 1.55);
  const totalW = gap * 2 + hs;
  const sx = W - 16 - totalW - hs/2, sy = 10;

  for (let i = 0; i < 3; i++) {
    const cx = sx + i * gap + hs/2;
    heartPath(cx, sy, hs);
    ctx.fillStyle   = i < lives ? '#E74C3C' : 'rgba(255,255,255,0.12)';
    ctx.strokeStyle = i < lives ? '#C0392B' : 'rgba(255,255,255,0.22)';
    ctx.lineWidth   = 1.5;
    ctx.fill(); ctx.stroke();
  }

  // Refill progress bar
  const bw = totalW + hs, bh = 4, bx = sx, by = sy + hs + 5;
  const prog = lifeTimer / LIFE_RESET;
  ctx.fillStyle = 'rgba(255,255,255,0.10)';
  rRect(bx, by, bw, bh, 2); ctx.fill();
  if (lives < 3) {
    ctx.fillStyle = '#E74C3C';
    rRect(bx, by, bw * prog, bh, 2); ctx.fill();
  } else {
    ctx.fillStyle = '#2ECC71';
    rRect(bx, by, bw * prog, bh, 2); ctx.fill();
  }

  // Countdown timer box — only when lives are missing
  if (lives < 3) {
    const framesLeft = LIFE_RESET - lifeTimer;
    const totalSecs  = Math.ceil(framesLeft / 60);
    const mins = Math.floor(totalSecs / 60);
    const secs = totalSecs % 60;
    const countdown = mins + ':' + (secs < 10 ? '0' : '') + secs;

    const fontSize = Math.round(H * 0.013);
    ctx.font = `bold ${fontSize}px "Comic Sans MS", cursive`;
    const label = '♥ next in ' + countdown;
    const tw = ctx.measureText(label).width;
    const pad = 6;
    const boxX = bx + bw / 2 - tw / 2 - pad;
    const boxY = by + bh + 4;
    const boxW = tw + pad * 2;
    const boxH = fontSize + pad;

    // Background pill
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    rRect(boxX, boxY, boxW, boxH, boxH / 2);
    ctx.fill();

    // Timer text
    ctx.fillStyle = '#FF6B6B';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(label, bx + bw / 2, boxY + pad / 2);
    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';
  }
}

// ── World select UI & badges ──────────────────────────────────────────────────

const WORLD_META = [
  { name: 'World I',   icon: '🔥', color: '#E74C3C', dark: '#9B2335' },
  { name: 'World II',  icon: '🌊', color: '#1ABC9C', dark: '#148A6A' },
  { name: 'World III', icon: '✨', color: '#9B59B6', dark: '#6C3483' },
];

function drawUnlockBanner() {
  if (!unlockBannerTimer) return;
  unlockBannerTimer++;
  if (unlockBannerTimer > UNLOCK_BANNER_DUR) { unlockBannerTimer = 0; return; }
  const fade = unlockBannerTimer < 40 ? unlockBannerTimer / 40 :
               unlockBannerTimer > UNLOCK_BANNER_DUR - 40 ? (UNLOCK_BANNER_DUR - unlockBannerTimer) / 40 : 1;
  const wm = WORLD_META[unlockBannerWorld - 1] || WORLD_META[0];

  ctx.save();
  ctx.globalAlpha = fade;
  const bw = Math.round(W * 0.54), bh = Math.round(H * 0.11);
  const bx = W/2 - bw/2, by = H/2 - bh - Math.round(H * 0.06);

  ctx.shadowColor = wm.color; ctx.shadowBlur = 30;
  ctx.fillStyle = wm.color;
  if (ctx.roundRect) ctx.roundRect(bx, by, bw, bh, 14); else ctx.rect(bx, by, bw, bh);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  if (ctx.roundRect) ctx.roundRect(bx+4, by+4, bw-8, bh/2-4, 8); else ctx.rect(bx+4, by+4, bw-8, bh/2-4);
  ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = `bold ${Math.round(H*0.036)}px "Comic Sans MS", cursive`;
  ctx.fillText(`${wm.icon} ${wm.name} Unlocked! ${wm.icon}`, W/2, by + bh * 0.40);
  ctx.font = `${Math.round(H*0.019)}px "Comic Sans MS", cursive`;
  ctx.fillStyle = 'rgba(255,255,255,0.80)';
  ctx.fillText('Click "⚡ Alt. Worlds" below to enter', W/2, by + bh * 0.75);
  ctx.restore();
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
}

function drawRemixBadge() {
  if (activeWorld === 0) return;
  const wm = WORLD_META[activeWorld - 1];
  const pulse = 0.82 + 0.18 * Math.sin(time * 0.07);
  ctx.save();
  ctx.globalAlpha = pulse;
  ctx.font = `bold ${Math.round(H*0.021)}px "Comic Sans MS", cursive`;
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  const label = `${wm.icon} ${wm.name}`;
  const tw = ctx.measureText(label).width;
  const px = 14, py = 10, pad = 8;
  ctx.fillStyle = wm.color;
  ctx.shadowColor = wm.dark; ctx.shadowBlur = 10;
  if (ctx.roundRect) ctx.roundRect(px - pad, py - pad/2, tw + pad*2, Math.round(H*0.021) + pad, 8);
  else ctx.rect(px - pad, py - pad/2, tw + pad*2, Math.round(H*0.021) + pad);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.fillText(label, px, py);
  ctx.restore();
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
}

function drawWorldSelect() {
  if (!worldSelectOpen) return;

  // Dim backdrop
  ctx.fillStyle = 'rgba(0,0,0,0.82)';
  ctx.fillRect(0, 0, W, H);

  const panelW = Math.min(W * 0.82, 820);
  const panelH = Math.round(H * 0.68);
  const panelX = W/2 - panelW/2;
  const panelY = H/2 - panelH/2;
  _wsPanel = { x: panelX, y: panelY, w: panelW, h: panelH };

  // Panel background
  ctx.fillStyle = '#111';
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 2;
  if (ctx.roundRect) ctx.roundRect(panelX, panelY, panelW, panelH, 18);
  else ctx.rect(panelX, panelY, panelW, panelH);
  ctx.fill(); ctx.stroke();

  // Title
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.round(H*0.042)}px "Comic Sans MS", cursive`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText('Alt. Worlds', W/2, panelY + Math.round(H*0.028));

  // Subtitle
  ctx.font = `${Math.round(H*0.018)}px "Comic Sans MS", cursive`;
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.fillText('Mirrored layouts · black skies · more challenge', W/2, panelY + Math.round(H*0.082));

  // 3 cards
  const gap      = Math.round(panelW * 0.045);
  const cardW    = Math.round((panelW - gap * 4) / 3);
  const cardH    = Math.round(panelH * 0.56);
  const cardY    = panelY + Math.round(panelH * 0.22);
  _wsCards = [];

  for (let i = 0; i < 3; i++) {
    const cx  = panelX + gap + i * (cardW + gap);
    const wm  = WORLD_META[i];
    const unlocked = maxLevelReached >= WORLD_UNLOCKS[i] - 1;
    const active   = activeWorld === i + 1;
    _wsCards.push({ x: cx, y: cardY, w: cardW, h: cardH, unlocked, worldIdx: i + 1 });

    ctx.save();
    if (!unlocked) ctx.globalAlpha = 0.38;

    // Card fill
    ctx.fillStyle   = active ? wm.color : '#1e1e1e';
    ctx.strokeStyle = active ? '#fff' : (unlocked ? wm.color : '#333');
    ctx.lineWidth   = active ? 3 : 1.5;
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(cx, cardY, cardW, cardH, 12);
    else ctx.rect(cx, cardY, cardW, cardH);
    ctx.fill(); ctx.stroke();

    // Icon
    ctx.font = `${Math.round(cardH * 0.28)}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = unlocked ? '#fff' : '#555';
    ctx.fillText(unlocked ? wm.icon : '🔒', cx + cardW/2, cardY + cardH * 0.32);

    // Name
    ctx.font = `bold ${Math.round(H*0.026)}px "Comic Sans MS", cursive`;
    ctx.fillStyle = active ? '#fff' : (unlocked ? wm.color : '#555');
    ctx.fillText(wm.name, cx + cardW/2, cardY + cardH * 0.60);

    // Unlock hint
    ctx.font = `${Math.round(H*0.017)}px "Comic Sans MS", cursive`;
    ctx.fillStyle = unlocked ? 'rgba(255,255,255,0.55)' : 'rgba(255,255,255,0.35)';
    ctx.fillText(unlocked ? (active ? 'Active' : 'Click to enter') : `Reach level ${WORLD_UNLOCKS[i]}`,
                 cx + cardW/2, cardY + cardH * 0.80);

    ctx.restore();
  }

  // ESC hint + back to normal
  ctx.font = `${Math.round(H*0.017)}px "Comic Sans MS", cursive`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  ctx.fillStyle = 'rgba(255,255,255,0.32)';
  ctx.fillText('Press ESC or click outside to close  ·  Playing normally? Stay right here!',
               W/2, panelY + panelH - Math.round(H*0.016));

  // "Return to Normal World" link
  if (activeWorld > 0) {
    ctx.font = `${Math.round(H*0.020)}px "Comic Sans MS", cursive`;
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.fillText('← Return to Normal World', W/2, panelY + panelH - Math.round(H*0.055));

    // store clickable area for "return to normal"
    const tw2 = ctx.measureText('← Return to Normal World').width;
    _wsPanel.normalBtn = {
      x: W/2 - tw2/2 - 8,
      y: panelY + panelH - Math.round(H*0.055) - Math.round(H*0.020) - 4,
      w: tw2 + 16,
      h: Math.round(H*0.026),
    };
  } else {
    _wsPanel.normalBtn = null;
  }

  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
}

// ── Platform drawing mode ─────────────────────────────────────────────────────

function drawPlatformPreview() {
  if (!drawMode || !isDragging) return;
  const x = Math.min(dragStartX, mouseX);
  const w = Math.abs(mouseX - dragStartX);
  if (w < 6) return;
  const pal = getPlatPal();
  const col = pal[drawColorIdx % pal.length];
  ctx.save();
  ctx.globalAlpha = 0.52;
  drawPlatform({ x, y: dragStartY, w, color: col, pvx:0, pvy:0 });
  ctx.restore();
  // Dashed edge highlight
  ctx.save();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([5, 5]);
  ctx.globalAlpha = 0.7;
  ctx.strokeRect(x, dragStartY - PLAT_TH, w, PLAT_TH);
  ctx.setLineDash([]);
  ctx.restore();
}



// ── Main loop ─────────────────────────────────────────────────────────────────

function loop() {
  update();
  tickConfetti();
  drawBg();
  platforms.forEach(drawPlatform);
  drawPlatformPreview();
  keyItems.forEach(drawKey);
  if (door) drawDoor(door);
  drawPlayerShadow();
  drawFigure(player.x, player.y, legAngle, player.face);
  drawConfetti();
  drawKeyHUD();
  drawLivesHUD();
  drawRemixBadge();
  drawDoorBumpMsg();
  drawMessage();
  drawUnlockBanner();
  drawShop();
  drawGameOver();
  drawWorldSelect();
  requestAnimationFrame(loop);
}

init(getLevel(0));
requestAnimationFrame(loop);

document.getElementById('shop-btn').addEventListener('click', () => { shopOpen = true; });

canvas.addEventListener('click', e => {
  if (!shopOpen) return;
  const rect = canvas.getBoundingClientRect();
  const sx = (e.clientX - rect.left) * (W / rect.width);
  const sy = (e.clientY - rect.top)  * (H / rect.height);
  for (const btn of shopBtnRects) {
    if (sx >= btn.x && sx <= btn.x + btn.w && sy >= btn.y && sy <= btn.y + btn.h) {
      if (btn.type === 'close') { shopOpen = false; }
      else if (btn.type === 'tab') { shopTab = btn.tab; }
      else if (btn.type === 'equip') {
        activeChar = btn.id;
        localStorage.setItem('pf_activeChar', activeChar);
      } else if (btn.type === 'buy') {
        if      (btn.world === 1) { fireKeys  -= btn.price; localStorage.setItem('pf_fireKeys',  fireKeys); }
        else if (btn.world === 2) { waterKeys -= btn.price; localStorage.setItem('pf_waterKeys', waterKeys); }
        else if (btn.world === 3) { elecKeys  -= btn.price; localStorage.setItem('pf_elecKeys',  elecKeys); }
        else                      { bankKeys  -= btn.price; localStorage.setItem('pf_bankKeys',  bankKeys); }
        ownedChars.add(btn.id);
        activeChar = btn.id;
        localStorage.setItem('pf_ownedChars', JSON.stringify([...ownedChars]));
        localStorage.setItem('pf_activeChar', activeChar);
      }
      break;
    }
  }
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && shopOpen) { shopOpen = false; e.preventDefault(); }
});

document.getElementById('redo').addEventListener('click', () => {
  gameOver = false; gameOverAlpha = 0;
  lives = 3; lifeTimer = 0;
  levelNum = 0;
  init(getLevel(0));
});

document.getElementById('remix-btn').addEventListener('click', () => {
  worldSelectOpen = !worldSelectOpen;
});

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;

  if (!worldSelectOpen) return;

  // "Return to Normal World" link
  if (_wsPanel.normalBtn) {
    const nb = _wsPanel.normalBtn;
    if (mx >= nb.x && mx <= nb.x+nb.w && my >= nb.y && my <= nb.y+nb.h) {
      activeWorld = 0;
      worldSelectOpen = false;
      lives = 3; lifeTimer = 0; levelNum = 0;
      init(getLevel(0));
      return;
    }
  }

  // World cards
  for (const card of _wsCards) {
    if (mx >= card.x && mx <= card.x+card.w && my >= card.y && my <= card.y+card.h) {
      if (!card.unlocked) return;
      activeWorld = card.worldIdx;
      worldSelectOpen = false;
      lives = 3; lifeTimer = 0; levelNum = 0;
      init(getLevel(0));
      return;
    }
  }

  // Click outside panel — close
  if (mx < _wsPanel.x || mx > _wsPanel.x+_wsPanel.w ||
      my < _wsPanel.y || my > _wsPanel.y+_wsPanel.h) {
    worldSelectOpen = false;
  }
});

document.addEventListener('keydown', e => {
  if (e.code === 'Escape') { worldSelectOpen = false; }
}, true);


// Show button if any world is already unlocked from a previous session
if (maxLevelReached >= WORLD_UNLOCKS[0] - 1) document.getElementById('remix-btn').style.display = 'inline-block';

// ── Platform draw mode ────────────────────────────────────────────────────────
drawBtn = document.getElementById('draw-btn');
updateDrawBtn();

function updateDrawBtn() {
  if (!drawBtn) return;
  const out = drawsLeft <= 0;
  drawBtn.disabled = out;
  drawBtn.style.opacity = out ? '0.4' : '1';
  if (drawMode) {
    drawBtn.style.background  = '#27AE60';
    drawBtn.style.color       = '#fff';
    drawBtn.style.borderColor = '#1E8449';
    drawBtn.textContent       = `✏ Drawing… (${drawsLeft} left)`;
  } else {
    drawBtn.style.background  = '';
    drawBtn.style.color       = '';
    drawBtn.style.borderColor = '';
    drawBtn.textContent       = `✏ Draw (${drawsLeft})`;
  }
}

function setDrawMode(on) {
  drawMode = on && drawsLeft > 0;
  isDragging = false;
  canvas.style.cursor = drawMode ? 'crosshair' : 'default';
  updateDrawBtn();
}

drawBtn.addEventListener('click', () => {
  setDrawMode(!drawMode);
  worldSelectOpen = false;
});

canvas.addEventListener('mousedown', e => {
  if (!drawMode || worldSelectOpen) return;
  if (e.button !== 0) return;
  const rect = canvas.getBoundingClientRect();
  dragStartX = e.clientX - rect.left;
  dragStartY = e.clientY - rect.top;
  mouseX = dragStartX;
  isDragging = true;
});

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = e.clientX - rect.left;
  mouseY = e.clientY - rect.top;
});

canvas.addEventListener('mouseup', e => {
  if (!isDragging) return;
  isDragging = false;
  const x = Math.min(dragStartX, mouseX);
  const w = Math.abs(mouseX - dragStartX);
  if (w >= W * 0.035 && drawsLeft > 0) {
    const pal = getPlatPal();
    const col = pal[drawColorIdx % pal.length];
    drawColorIdx++;
    platforms.push({ x, y: dragStartY, w, baseX:x, baseY:dragStartY, pvx:0, pvy:0, color:col });
    drawsLeft--;
    if (drawsLeft <= 0) setDrawMode(false);
    else updateDrawBtn();
  }
});
</script>
