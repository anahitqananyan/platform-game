<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Umbral</title>
  <meta name="description" content="Umbral — a platform adventure through shadow and light.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber:    #D4822A;
      --amber-dim:#7A4015;
      --text:     #F5EDE0;
      --muted:    #A06050;
      --border:   #5A2020;
    }

    html, body {
      height: 100%;
      background: #3A000C;
      color: var(--text);
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    #bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .home {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 3.5rem;
      padding: 2rem;
    }

    /* ── Logo ── */
    .logo {
      text-align: center;
      opacity: 0;
      transform: translateY(-18px);
      animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
    }

    .logo-eyebrow {
      font-size: 0.68rem;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.8rem;
    }

    .logo-title {
      font-family: 'Cinzel', 'Palatino Linotype', serif;
      font-size: clamp(4.5rem, 13vw, 9.5rem);
      font-weight: 900;
      letter-spacing: 0.08em;
      line-height: 1;
      text-transform: uppercase;
      color: var(--text);
      text-shadow:
        0 0 45px rgba(212, 130, 42, 0.55),
        0 0 90px rgba(212, 130, 42, 0.22),
        0 2px 4px rgba(0, 0, 0, 0.6);
      text-wrap: balance;
    }

    /* ── Menu ── */
    .menu {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 0.55rem;
      width: 100%;
      max-width: 255px;
    }

    .btn-play {
      width: 100%;
      padding: 0.95rem 1.5rem;
      font-family: 'Cinzel', serif;
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      background: var(--amber);
      color: #180408;
      border: none;
      cursor: pointer;
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.45s forwards;
      transition: box-shadow 220ms, transform 80ms;
    }

    .btn-play:hover {
      box-shadow: 0 0 30px rgba(212, 130, 42, 0.75), 0 0 65px rgba(212, 130, 42, 0.28);
    }

    .btn-play:active { transform: scale(0.98); }

    .btn-menu {
      position: relative;
      width: 100%;
      padding: 0.65rem 1rem 0.65rem 1.8rem;
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      text-align: left;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: color 150ms, border-color 150ms, background 150ms, padding-left 150ms;
      opacity: 0;
      animation: fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) var(--delay) forwards;
    }

    .btn-menu::before {
      content: '▶';
      position: absolute;
      left: 0.55rem;
      top: 50%;
      transform: translateY(-50%) scale(0.6);
      font-size: 0.52rem;
      color: var(--amber);
      opacity: 0;
      transition: opacity 150ms, transform 150ms;
    }

    .btn-menu:hover {
      color: var(--text);
      border-color: var(--amber-dim);
      background: rgba(212, 130, 42, 0.08);
      padding-left: 2.1rem;
    }

    .btn-menu:hover::before {
      opacity: 1;
      transform: translateY(-50%) scale(1);
    }

    .btn-play:focus-visible,
    .btn-menu:focus-visible {
      outline: 2px solid var(--amber);
      outline-offset: 3px;
    }

    .btn-menu:nth-child(2) { --delay: 0.55s; }
    .btn-menu:nth-child(3) { --delay: 0.63s; }

    .version {
      position: fixed;
      bottom: 1.25rem;
      right: 1.5rem;
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      opacity: 0.45;
      text-transform: uppercase;
      z-index: 2;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .logo, .btn-play, .btn-menu { animation: none; opacity: 1; transform: none; }
      .btn-play, .btn-menu { transition: none; }
    }

    /* ── Settings overlay ── */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(4, 0, 2, 0.82);
      opacity: 0;
      visibility: hidden;
      transition: opacity 280ms, visibility 280ms;
      padding: 1rem;
    }

    .overlay.open {
      opacity: 1;
      visibility: visible;
    }

    .settings-panel {
      position: relative;
      width: 100%;
      max-width: 380px;
      background: rgba(10, 2, 5, 0.97);
      border: 1px solid #3A1010;
      padding: 2.2rem 2.2rem 2rem;
      transform: translateY(22px);
      transition: transform 300ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .overlay.open .settings-panel {
      transform: translateY(0);
    }

    /* cut corner to match play button style */
    .settings-panel {
      clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px));
    }

    .panel-close {
      position: absolute;
      top: 0.85rem;
      right: 1rem;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1rem;
      cursor: pointer;
      line-height: 1;
      padding: 0.2rem 0.4rem;
      transition: color 150ms;
    }

    .panel-close:hover { color: var(--text); }

    .panel-title {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 2rem;
    }

    .panel-section {
      margin-bottom: 1.8rem;
    }

    .panel-section:last-child { margin-bottom: 0; }

    .panel-label {
      display: block;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.9rem;
    }

    .vol-track {
      display: flex;
      align-items: center;
      gap: 0.85rem;
    }

    .vol-icon {
      font-size: 0.85rem;
      color: var(--muted);
      flex-shrink: 0;
      user-select: none;
    }

    .vol-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 3px;
      background: var(--border);
      outline: none;
      cursor: pointer;
      border-radius: 2px;
    }

    .vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: var(--amber);
      cursor: pointer;
      box-shadow: 0 0 8px rgba(212, 130, 42, 0.6);
      transition: box-shadow 150ms, transform 150ms;
    }

    .vol-slider::-webkit-slider-thumb:hover {
      box-shadow: 0 0 16px rgba(212, 130, 42, 0.9);
      transform: scale(1.15);
    }

    .vol-slider::-moz-range-thumb {
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: var(--amber);
      border: none;
      cursor: pointer;
    }

    .vol-num {
      font-size: 0.72rem;
      font-variant-numeric: tabular-nums;
      color: var(--muted);
      min-width: 2.4ch;
      text-align: right;
      flex-shrink: 0;
    }

    .panel-divider {
      height: 1px;
      background: var(--border);
      opacity: 0.5;
      margin-bottom: 1.8rem;
    }

    .panel-desc {
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 1rem;
    }

    .btn-reset {
      width: 100%;
      padding: 0.7rem 1.2rem;
      font-family: inherit;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      background: transparent;
      color: #B85050;
      border: 1px solid #5A1818;
      cursor: pointer;
      transition: background 160ms, color 160ms, border-color 160ms;
    }

    .btn-reset:hover {
      background: rgba(180, 40, 40, 0.15);
      color: #E08080;
      border-color: #8A2828;
    }

    .btn-reset.confirming {
      color: #E08080;
      border-color: #8A2828;
      background: rgba(180, 40, 40, 0.12);
    }

    .btn-reset.done {
      color: #6FAE70;
      border-color: #2E5A2E;
      background: rgba(50, 120, 50, 0.12);
    }

    .btn-reset:focus-visible {
      outline: 2px solid #B85050;
      outline-offset: 3px;
    }

    /* ── Shadow Screen ── */
    #shadowScreen {
      display: none;
      position: fixed;
      inset: 0;
      background: #050002;
      z-index: 500;
      flex-direction: column;
    }
    #shadowScreen.open { display: flex; }

    .ss-header {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding: 0.85rem 1.5rem;
      border-bottom: 1px solid #200008;
      flex-shrink: 0;
      height: 52px;
    }
    .ss-back {
      background: none; border: none;
      font-family: 'Cinzel', serif;
      font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: #804040; cursor: pointer; transition: color 150ms;
    }
    .ss-back:hover { color: var(--text); }
    .ss-level-name {
      font-family: 'Cinzel', serif;
      font-size: 0.88rem; font-weight: 700;
      letter-spacing: 0.18em; text-transform: uppercase; color: var(--text);
    }
    .ss-hint {
      font-size: 0.7rem; letter-spacing: 0.1em;
      color: var(--muted); margin-left: auto; font-style: italic;
    }
    #gameCvs {
      flex: 1; display: block; width: 100%;
      cursor: grab; min-height: 0;
    }
    #gameCvs:active { cursor: grabbing; }

    .ss-drag-label {
      position: absolute; bottom: 1rem; left: 50%;
      transform: translateX(-50%);
      font-size: 0.6rem; letter-spacing: 0.28em; text-transform: uppercase;
      color: rgba(120,40,20,0.6); pointer-events: none;
    }

    #ssSolvedOverlay {
      display: none; position: absolute; inset: 0; z-index: 10;
      background: rgba(2,0,1,0.80);
      align-items: center; justify-content: center;
      flex-direction: column; gap: 1.8rem;
      font-family: 'Cinzel', serif; font-size: 2.4rem; font-weight: 700;
      letter-spacing: 0.15em; color: var(--amber);
      text-shadow: 0 0 55px rgba(212,130,42,0.9);
    }
    #ssSolvedOverlay.show { display: flex; }
    .ss-next-btn {
      font-family: 'Cinzel', serif; font-size: 0.8rem; font-weight: 700;
      letter-spacing: 0.2em; text-transform: uppercase;
      background: var(--amber); color: #100204;
      border: none; padding: 0.8rem 2.2rem; cursor: pointer;
      clip-path: polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));
      transition: box-shadow 200ms;
    }
    .ss-next-btn:hover { box-shadow: 0 0 26px rgba(212,130,42,0.65); }

    .lvl-btn {
      aspect-ratio: 1;
      font-family: 'Cinzel', serif;
      font-size: 1.4rem;
      font-weight: 700;
      background: #7A1820;
      color: #F5EDE0;
      border: 2px solid #5A0E16;
      cursor: pointer;
      transition: background 150ms, transform 80ms, box-shadow 150ms;
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
    }

    .lvl-btn:hover {
      background: #5A0E16;
      box-shadow: 0 4px 22px rgba(90, 14, 22, 0.45);
    }

    .lvl-btn:active { transform: scale(0.95); }
  </style>
</head>
<body>

<canvas id="bg"></canvas>

<main class="home">
  <div class="logo">
    <h1 class="logo-title">Umbral</h1>
  </div>

  <nav class="menu" aria-label="Main menu">
    <button class="btn-play" id="btnPlay">▶&nbsp;&nbsp;Play</button>
    <button class="btn-menu">Continue</button>
    <button class="btn-menu" id="btnSettings">Settings</button>
  </nav>
</main>

<!-- Game screen -->
<div id="gameScreen" style="display:none;position:fixed;inset:0;background:#F0E2D0;z-index:300;">
  <button id="btnBackToMenu" style="
    position: absolute;
    top: 1.2rem; left: 1.4rem;
    background: none;
    border: none;
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #8B3A2A;
    cursor: pointer;
    opacity: 0.7;
    transition: opacity 150ms;
  " onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.7">← Menu</button>

  <div style="
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 2rem;
  ">
    <h2 style="
      font-family: 'Cinzel', serif;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #6B2010;
    ">Select Level</h2>

    <div style="
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 1.8rem;
      width: 100%;
      max-width: 860px;
      padding: 0 2.5rem;
    ">
      <button class="lvl-btn" data-level="1">1</button>
      <button class="lvl-btn" data-level="2">2</button>
      <button class="lvl-btn" data-level="3">3</button>
      <button class="lvl-btn" data-level="4">4</button>
      <button class="lvl-btn" data-level="5">5</button>
      <button class="lvl-btn" data-level="6">6</button>
      <button class="lvl-btn" data-level="7">7</button>
      <button class="lvl-btn" data-level="8">8</button>
      <button class="lvl-btn" data-level="9">9</button>
      <button class="lvl-btn" data-level="10">10</button>
      <button class="lvl-btn" data-level="11">11</button>
      <button class="lvl-btn" data-level="12">12</button>
      <button class="lvl-btn" data-level="13">13</button>
      <button class="lvl-btn" data-level="14">14</button>
      <button class="lvl-btn" data-level="15">15</button>
    </div>
  </div>
</div>

<!-- Settings panel -->
<div class="overlay" id="overlay" aria-hidden="true">
  <div class="settings-panel" role="dialog" aria-label="Settings">
    <button class="panel-close" id="btnClose" aria-label="Close settings">✕</button>
    <h2 class="panel-title">Settings</h2>

    <div class="panel-section">
      <label class="panel-label" for="volSlider">Music Volume</label>
      <div class="vol-track">
        <span class="vol-icon">♪</span>
        <input type="range" id="volSlider" class="vol-slider" min="0" max="100" value="52">
        <span class="vol-num" id="volNum">52</span>
      </div>
    </div>

    <div class="panel-divider"></div>

    <div class="panel-section">
      <p class="panel-desc">Erase all saved progress and return to the very beginning.</p>
      <button class="btn-reset" id="btnReset">Reset Game</button>
    </div>
  </div>
</div>

<!-- Shadowmatic level screen -->
<div id="shadowScreen">
  <div class="ss-header">
    <button class="ss-back" id="btnSsBack">← Levels</button>
    <span class="ss-level-name" id="ssLevelName">Level 1 · House</span>
    <span class="ss-hint" id="ssHint">A cozy home</span>
  </div>
  <canvas id="gameCvs"></canvas>
  <span class="ss-drag-label">Drag to rotate the object</span>
  <div id="ssSolvedOverlay">
    <span>✓ Solved</span>
    <button class="ss-next-btn" id="ssNextBtn">Next Level →</button>
  </div>
</div>

<p class="version">v1.0.0</p>

<script>
  // ── Canvas background ──────────────────────────────────────
  const canvas = document.getElementById('bg');
  const ctx    = canvas.getContext('2d');
  let W, H;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  let t = 0;

  // ── 3D Room background ──────────────────────────────────────
  const FOV3 = 520;

  // Icosahedron vertices (radius ~58)
  const _φ = 1.6180339887;
  const ICO_V_RAW = [
    [0,1,_φ],[0,-1,_φ],[0,1,-_φ],[0,-1,-_φ],
    [1,_φ,0],[-1,_φ,0],[1,-_φ,0],[-1,-_φ,0],
    [_φ,0,1],[-_φ,0,1],[_φ,0,-1],[-_φ,0,-1]
  ];
  const ICO_VERTS = ICO_V_RAW.map(([x,y,z])=>{
    const l=Math.sqrt(x*x+y*y+z*z); return [x/l*58,y/l*58,z/l*58];
  });
  const ICO_FACES = [
    [0,1,8],[0,8,4],[0,4,5],[0,5,9],[0,9,1],
    [1,6,8],[8,6,10],[8,10,4],[4,10,2],[4,2,5],
    [5,2,11],[5,11,9],[9,11,7],[9,7,1],[1,7,6],
    [3,6,7],[3,7,11],[3,11,2],[3,2,10],[3,10,6]
  ];
  const BG_LIGHT = (()=>{
    const v=[0.55,-0.75,0.85]; const l=Math.sqrt(v[0]**2+v[1]**2+v[2]**2);
    return v.map(x=>x/l);
  })();

  let bgRx=0, bgRy=0;

  // Dust particles
  const DUST = Array.from({length:38}, ()=>({
    x: (Math.random()-0.5)*2,
    y: (Math.random()-0.5)*2,
    z: Math.random(),
    r: 0.4+Math.random()*1.1,
    spd: 0.00012+Math.random()*0.00018,
    phase: Math.random()*Math.PI*2
  }));

  function proj3(x,y,z,cx,cy){
    const s=FOV3/(FOV3+z+280); return [cx+x*s, cy+y*s];
  }

  function rot3(v,rx,ry){
    let [x,y,z]=v;
    const cxr=Math.cos(rx),sxr=Math.sin(rx);
    const y2=y*cxr-z*sxr, z2=y*sxr+z*cxr;
    const cyr=Math.cos(ry),syr=Math.sin(ry);
    return [x*cyr+z2*syr, y2, -x*syr+z2*cyr];
  }

  function drawRoom() {
    const cx=W*0.5, cy=H*0.44;
    const rw=Math.min(W*0.54,500);
    const rh=Math.min(H*0.46,400);
    const rd=620;

    // Fill
    ctx.fillStyle='#030001'; ctx.fillRect(0,0,W,H);

    // Projected corners helpers
    const p=(...a)=>proj3(...a,cx,cy);

    // Back wall
    const bTL=p(-rw,-rh,rd), bTR=p(rw,-rh,rd);
    const bBL=p(-rw,rh,rd),  bBR=p(rw,rh,rd);
    const bwG=ctx.createLinearGradient(cx,bTL[1],cx,bBL[1]);
    bwG.addColorStop(0,'#0B0203'); bwG.addColorStop(0.45,'#1E0507');
    bwG.addColorStop(0.72,'#220508'); bwG.addColorStop(1,'#080102');
    ctx.fillStyle=bwG;
    ctx.beginPath(); ctx.moveTo(bTL[0],bTL[1]); ctx.lineTo(bTR[0],bTR[1]);
    ctx.lineTo(bBR[0],bBR[1]); ctx.lineTo(bBL[0],bBL[1]); ctx.closePath(); ctx.fill();

    // Back wall warm centre glow
    const bCx=(bTL[0]+bTR[0])/2, bCy=bTL[1]+(bBL[1]-bTL[1])*0.52;
    const bwGlow=ctx.createRadialGradient(bCx,bCy,0,bCx,bCy,rw*1.0);
    bwGlow.addColorStop(0,'rgba(195,80,18,0.20)'); bwGlow.addColorStop(0.5,'rgba(140,40,10,0.08)');
    bwGlow.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=bwGlow; ctx.fillRect(0,0,W,H);

    // Left wall
    const cNL=p(-rw,-rh,0), fNL=p(-rw,rh,0);
    const cFL=p(-rw,-rh,rd), fFL=p(-rw,rh,rd);
    const lwG=ctx.createLinearGradient(cNL[0],0,cFL[0],0);
    lwG.addColorStop(0,'#050102'); lwG.addColorStop(1,'#0D0204');
    ctx.fillStyle=lwG;
    ctx.beginPath(); ctx.moveTo(cNL[0],cNL[1]); ctx.lineTo(cFL[0],cFL[1]);
    ctx.lineTo(fFL[0],fFL[1]); ctx.lineTo(fNL[0],fNL[1]); ctx.closePath(); ctx.fill();

    // Right wall
    const cNR=p(rw,-rh,0), fNR=p(rw,rh,0);
    const cFR=p(rw,-rh,rd), fFR=p(rw,rh,rd);
    const rwG=ctx.createLinearGradient(cNR[0],0,cFR[0],0);
    rwG.addColorStop(0,'#050102'); rwG.addColorStop(1,'#0D0204');
    ctx.fillStyle=rwG;
    ctx.beginPath(); ctx.moveTo(cNR[0],cNR[1]); ctx.lineTo(cFR[0],cFR[1]);
    ctx.lineTo(fFR[0],fFR[1]); ctx.lineTo(fNR[0],fNR[1]); ctx.closePath(); ctx.fill();

    // Ceiling
    ctx.fillStyle='#040102';
    ctx.beginPath(); ctx.moveTo(cNL[0],cNL[1]); ctx.lineTo(cNR[0],cNR[1]);

      const nx=ay*bz-az*by, ny=az*bx-ax*bz, nz=ax*by-ay*bx;
      const nl=Math.sqrt(nx*nx+ny*ny+nz*nz);
      if(nl===0||nz/nl<0) return;
      const dot=Math.max(0,(nx*BG_LIGHT[0]+ny*BG_LIGHT[1]+nz*BG_LIGHT[2])/nl);

      ctx.beginPath();
      ctx.moveTo(objX+verts[0][0], objY+verts[0][1]);
      ctx.lineTo(objX+verts[1][0], objY+verts[1][1]);
      ctx.lineTo(objX+verts[2][0], objY+verts[2][1]);
      ctx.closePath();
      ctx.fillStyle=`rgb(${Math.round(22+br*175)},${Math.round(3+br*52)},${Math.round(5+br*30)})`;

    gemGlow.addColorStop(0,'rgba(220,100,25,0.18)'); gemGlow.addColorStop(1,'rgba(0,0,0,0)');

    const shadowFY=p(0,rh*0.88,rd*0.5)[1];

    ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);

  function buildReverb(decaySec) {
    const conv = audioCtx.createConvolver();
    const rate = audioCtx.sampleRate;
    const len  = Math.floor(rate * decaySec);
    const buf  = audioCtx.createBuffer(2, len, rate);
    for (let ch = 0; ch < 2; ch++) {
      const d = buf.getChannelData(ch);
      for (let i = 0; i < len; i++) {
        d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 1.8) * 0.6;
      }
    }
    conv.buffer = buf;
    return conv;
  }

  function initAudio() {
    if (audioReady) return;
    audioReady = true;

    audioCtx  = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.52;
    masterGain.connect(audioCtx.destination);

    // Reverb chain
    reverbConv = buildReverb(4.5);
    const reverbGain = audioCtx.createGain();
    reverbGain.gain.value = 0.38;
    reverbConv.connect(reverbGain);
    reverbGain.connect(masterGain);

    dryBus = audioCtx.createGain();
    dryBus.gain.value = 1.0;
    dryBus.connect(masterGain);

    wetBus = audioCtx.createGain();
    wetBus.gain.value = 1.0;
    wetBus.connect(reverbConv);

    // Deep bass drone — A1 + E2
    [55, 82.41].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const g   = audioCtx.createGain();
      const lp  = audioCtx.createBiquadFilter();
      osc.type = 'sine';
      osc.frequency.value = freq + i * 0.12;
      lp.type = 'lowpass';
      lp.frequency.value = 170;
      g.gain.value = 0.042;
      osc.connect(lp); lp.connect(g); g.connect(masterGain);
      osc.start();
    });

    melodyTime = audioCtx.currentTime + 1.0;
    chordTime  = audioCtx.currentTime + 0.3;
    scheduleMelody();
    scheduleTimer = setInterval(() => {
      if (audioCtx.state === 'running') scheduleMelody();
    }, 800);
  }

  function playNote(freq, startTime, duration, gainVal) {
    const now = startTime;
    const atk = 0.7, rel = 1.3;

    // Two slightly detuned oscillators (chorus)
    [0, 5].forEach((detune, i) => {
      const osc    = audioCtx.createOscillator();
      const g      = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();

      osc.type = i === 0 ? 'sine' : 'triangle';
      osc.frequency.value = freq;
      osc.detune.value = detune;
      filter.type = 'lowpass';
      filter.frequency.value = 1400;
      filter.Q.value = 0.6;

      const vol = gainVal * (i === 0 ? 0.72 : 0.42);
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(vol, now + atk);
      g.gain.setValueAtTime(vol, now + duration - rel);
      g.gain.exponentialRampToValueAtTime(0.0001, now + duration);

      osc.connect(filter);
      filter.connect(g);
      g.connect(dryBus);
      g.connect(wetBus);
      osc.start(now);
      osc.stop(now + duration + 0.1);
    });
  }

  function scheduleMelody() {
    const horizon = audioCtx.currentTime + 4.0;

    while (melodyTime < horizon) {
      const [freq, dur, gain] = MELODY[melodyIdx % MELODY.length];
      playNote(freq, melodyTime, dur, gain);
      const gap = 0.7 + (melodyIdx % 4) * 0.35;
      melodyTime += dur * 0.52 + gap;
      melodyIdx++;
    }

    while (chordTime < horizon) {
      const [freqs, dur, gain] = CHORDS[chordIdx % CHORDS.length];
      freqs.forEach(f => playNote(f, chordTime, dur, gain));
      chordTime += dur * 0.75;
      chordIdx++;
    }
  }

  function ssBuild(pts, depth) {
    const d=depth/2, n=pts.length, faces=[];
    faces.push({ v: pts.map(([x,y])=>[x,y,d]) });
    faces.push({ v: [...pts].reverse().map(([x,y])=>[x,y,-d]) });
    for(let i=0;i<n;i++){

      faces.push({ v:[[pts[i][0],pts[i][1],d],[pts[j][0],pts[j][1],d],[pts[j][0],pts[j][1],-d],[pts[i][0],pts[i][1],-d]] });

    return faces;
  }

  function ssRot(v, rx, ry) {
    let [x,y,z]=v;
    const cxr=Math.cos(rx),sxr=Math.sin(rx),cyr=Math.cos(ry),syr=Math.sin(ry);
    const y2=y*cxr-z*sxr, z2=y*sxr+z*cxr;
    return [x*cyr+z2*syr, y2, -x*syr+z2*cyr];
  }

  function ssNorm(verts) {
    const a=[verts[1][0]-verts[0][0],verts[1][1]-verts[0][1],verts[1][2]-verts[0][2]];
    const b=[verts[2][0]-verts[0][0],verts[2][1]-verts[0][1],verts[2][2]-verts[0][2]];
    const nx=a[1]*b[2]-a[2]*b[1], ny=a[2]*b[0]-a[0]*b[2], nz=a[0]*b[1]-a[1]*b[0];
    const l=Math.sqrt(nx*nx+ny*ny+nz*nz);
    return l>0?[nx/l,ny/l,nz/l]:[0,0,1];
  }

  function ssMatchScore() {
    const sx=Math.abs(Math.sin(ssRx)), sy=Math.abs(Math.sin(ssRy));
    const cxs=Math.cos(ssRx)>0?1:0, cys=Math.cos(ssRy)>0?1:0;
    return Math.max(0, 1 - (sx+sy)*cxs*cys/0.36);
  }

  function ssCheckSolved() {
    return Math.abs(Math.sin(ssRx))<0.18 && Math.cos(ssRx)>0.97
        && Math.abs(Math.sin(ssRy))<0.18 && Math.cos(ssRy)>0.97;
  }

  // ── Unified 3D level scene — Shadowmatic style ──────────────

  // Builds all rotated faces for a level (single-part or multi-part).
  // Returns {allFaces, maxExt, parts}.
  function buildAllFaces(lvl, rx, ry) {
    const parts = lvl.parts
      ? lvl.parts
      : [{pts:lvl.pts, depth:lvl.depth, dx:0, dy:0}];
    let maxExt=0;
    const allFaces=[];
    parts.forEach(({pts,depth,dx=0,dy=0})=>{
      pts.forEach(([x,y])=>{
        maxExt=Math.max(maxExt, Math.sqrt((x+dx)**2+(y+dy)**2));
      });
      ssBuild(pts,depth).forEach(f=>{
        const rv=f.v.map(([vx,vy,vz])=>ssRot([vx+dx,vy+dy,vz],rx,ry));
        allFaces.push({v:rv, avgZ:rv.reduce((s,v)=>s+v[2],0)/rv.length});
      });
    });
    const normParts=parts.map(({pts,dx=0,dy=0})=>({pts,dx,dy}));
    return {allFaces, maxExt, parts:normParts};
  }

  // Light direction for the 3D object (from upper-right, camera side)
  const SS_OBJ_LIGHT = (()=>{
    const v=[0.55,-0.60,0.85]; const l=Math.sqrt(v[0]**2+v[1]**2+v[2]**2);
    return v.map(x=>x/l);
  })();

  // Draw a smooth porcelain-style blob (ellipse with radial gradient)
  function drawBlob(c, cx, cy, sc, blob, lightDir) {
    const bx=cx+blob.x*sc, by=cy+blob.y*sc;
    const rx=blob.rw*sc, ry=blob.rh*sc;
    // highlight offset — top-right (from light direction)
    const hx=bx-rx*0.32, hy=by-ry*0.36;
    const grad=c.createRadialGradient(hx,hy,rx*0.04, bx,by,Math.max(rx,ry)*1.05);
    grad.addColorStop(0,   'rgba(248,240,224,1.0)'); // bright highlight
    grad.addColorStop(0.28,'rgba(228,205,168,1.0)'); // warm cream
    grad.addColorStop(0.60,'rgba(185,148,96,1.0)');  // mid tan
    grad.addColorStop(0.85,'rgba(120,80,38,1.0)');   // dark edge
    grad.addColorStop(1,   'rgba(60,28,8,1.0)');     // shadow edge
    c.save();
    c.beginPath();
    c.ellipse(bx, by, rx, ry, 0, 0, Math.PI*2);
    c.fillStyle=grad; c.fill();
    // subtle specular dot
    const sg=c.createRadialGradient(hx-rx*0.08,hy-ry*0.08,0,hx,hy,rx*0.38);
    sg.addColorStop(0,'rgba(255,252,245,0.72)'); sg.addColorStop(1,'rgba(255,252,245,0)');
    c.fillStyle=sg; c.fill();
    c.restore();
  }

  function ssDrawScene(cvs, lvl, rx, ry) {
    const c=cvs.getContext('2d');
    const CW=cvs.width, CH=cvs.height;
    const fov=520;
    const vcx=CW*0.5, vcy=CH*0.44;

    const rw=Math.min(CW*0.52, 480);
    const rh=Math.min(CH*0.46, 390);
    const rd=640;

    function proj(x,y,z){ const s=fov/(fov+z+280); return [vcx+x*s, vcy+y*s]; }
    function quad(p1,p2,p3,p4,fill){
      c.beginPath(); c.moveTo(p1[0],p1[1]); c.lineTo(p2[0],p2[1]);
      c.lineTo(p3[0],p3[1]); c.lineTo(p4[0],p4[1]); c.closePath();
      c.fillStyle=fill; c.fill();
    }

    // ── 1. Dark wooden room ────────────────────────────────────
    c.fillStyle='#05030a'; c.fillRect(0,0,CW,CH);

    const bTL=proj(-rw,-rh,rd), bTR=proj(rw,-rh,rd);
    const bBL=proj(-rw,rh,rd),  bBR=proj(rw,rh,rd);
    const cNL=proj(-rw,-rh,0),  cNR=proj(rw,-rh,0);
    const fNL=proj(-rw,rh,0),   fNR=proj(rw,rh,0);

    // Back wall — dark warm wood base
    quad(bTL,bTR,bBR,bBL,'#1a0d06');

    // Horizontal planks on back wall
    const plankCount=10;
    const wallTop=bTL[1], wallBot=bBL[1], wallL=bTL[0], wallR=bTR[0];
    for(let i=0;i<plankCount;i++){
      const yA=wallTop+i*(wallBot-wallTop)/plankCount;
      const yB=wallTop+(i+1)*(wallBot-wallTop)/plankCount;
      const even=i%2===0;
      c.beginPath();
      c.moveTo(wallL,yA); c.lineTo(wallR,yA); c.lineTo(wallR,yB); c.lineTo(wallL,yB);
      c.closePath();
      c.fillStyle=even?'rgba(38,18,6,0.55)':'rgba(22,10,3,0.55)'; c.fill();
      // plank seam
      c.strokeStyle='rgba(8,3,1,0.70)'; c.lineWidth=0.8;
      c.beginPath(); c.moveTo(wallL,yA); c.lineTo(wallR,yA); c.stroke();
    }

    // Floor — dark wooden boards
    const flG=c.createLinearGradient(vcx,fNL[1],vcx,bBL[1]);
    flG.addColorStop(0,'#0e0604'); flG.addColorStop(1,'#1a0a04');
    quad(fNL,fNR,bBR,bBL,flG);
    // Floor plank lines (perspective foreshortened)
    for(let i=1;i<7;i++){
      const py=fNL[1]+(bBL[1]-fNL[1])*i/7;
      c.strokeStyle='rgba(4,2,1,0.55)'; c.lineWidth=0.6;
      c.beginPath(); c.moveTo(0,py); c.lineTo(CW,py); c.stroke();
    }

    // Ceiling — very dark
    quad(cNL,cNR,bTR,bTL,'#080406');

    // Left wall — vertical planks
    quad(cNL,bTL,bBL,fNL,'#120804');
    for(let i=0;i<5;i++){
      const f0=i/5, f1=(i+1)/5;
      const tx0=cNL[0]+(bTL[0]-cNL[0])*f0, tx1=cNL[0]+(bTL[0]-cNL[0])*f1;
      const bx0=fNL[0]+(bBL[0]-fNL[0])*f0, bx1=fNL[0]+(bBL[0]-fNL[0])*f1;
      c.strokeStyle='rgba(4,1,0,0.60)'; c.lineWidth=0.7;
      c.beginPath(); c.moveTo(tx0,cNL[1]); c.lineTo(bx0,fNL[1]); c.stroke();
    }

    // Right wall
    quad(cNR,bTR,bBR,fNR,'#120804');

    // ── 2. Warm spotlight on back wall (cream/white) ───────────
    const wallCx = (bTL[0]+bTR[0])*0.5;
    const wallCy = bTL[1] + (bBL[1]-bTL[1])*0.46;
    const wallH  = bBL[1]-bTL[1];
    const spotR  = wallH * 0.50;

    c.save();
    c.beginPath();
    c.moveTo(bTL[0],bTL[1]); c.lineTo(bTR[0],bTR[1]);
    c.lineTo(bBR[0],bBR[1]); c.lineTo(bBL[0],bBL[1]);
    c.closePath(); c.clip();

    // Outer warm haze
    const wallLit=c.createRadialGradient(wallCx,wallCy,0,wallCx,wallCy,spotR*1.22);
    wallLit.addColorStop(0,   'rgba(225,200,155,0.88)');
    wallLit.addColorStop(0.30,'rgba(200,165,100,0.70)');
    wallLit.addColorStop(0.60,'rgba(140, 90, 38,0.42)');
    wallLit.addColorStop(0.85,'rgba( 55, 22,  6,0.18)');
    wallLit.addColorStop(1,   'rgba(  0,  0,  0,0)');
    c.fillStyle=wallLit; c.fillRect(0,0,CW,CH);

    // Bright cream centre
    const hotspot=c.createRadialGradient(wallCx,wallCy,0,wallCx,wallCy,spotR*0.50);
    hotspot.addColorStop(0,  'rgba(252,248,235,0.96)');
    hotspot.addColorStop(0.35,'rgba(245,230,185,0.72)');
    hotspot.addColorStop(0.70,'rgba(220,180,100,0.30)');
    hotspot.addColorStop(1,  'rgba(0,0,0,0)');
    c.fillStyle=hotspot; c.fillRect(0,0,CW,CH);

    // ── 3. Shadow inside spotlight ─────────────────────────────
    const match=ssMatchScore();
    const {allFaces, maxExt, parts:lvlParts}=buildAllFaces(lvl, rx, ry);
    const shadowSc=spotR*0.62/maxExt;

    c.fillStyle='rgba(3,1,1,0.97)';
    allFaces.forEach(f=>{
      c.beginPath();
      c.moveTo(wallCx+f.v[0][0]*shadowSc, wallCy+f.v[0][1]*shadowSc);
      f.v.forEach(v=>c.lineTo(wallCx+v[0]*shadowSc, wallCy+v[1]*shadowSc));
      c.closePath(); c.fill();
    });

    // Target dashed outline
    c.strokeStyle=`rgba(230,160,60,${0.14+match*0.72})`;
    c.lineWidth=1.4+match*2.8;
    c.setLineDash([5,5]);
    lvlParts.forEach(({pts:pp,dx,dy})=>{
      c.beginPath();
      pp.forEach(([px,py],i)=>{
        const sx=wallCx+(px+dx)*shadowSc, sy=wallCy+(py+dy)*shadowSc;
        if(i===0) c.moveTo(sx,sy); else c.lineTo(sx,sy);
      });
      c.closePath(); c.stroke();
    });
    c.setLineDash([]);

    // Gold glow when nearly solved
    if(match>0.62){
      const g=(match-0.62)/0.38;
      c.save(); c.filter=`blur(${Math.round(6+g*13)}px)`;
      c.strokeStyle=`rgba(220,155,40,${g*0.42})`; c.lineWidth=9+g*20;
      lvlParts.forEach(({pts:pp,dx,dy})=>{
        c.beginPath();
        pp.forEach(([px,py],i)=>{
          const sx=wallCx+(px+dx)*shadowSc, sy=wallCy+(py+dy)*shadowSc;
          if(i===0) c.moveTo(sx,sy); else c.lineTo(sx,sy);
        });
        c.closePath(); c.stroke();
      });
      c.restore();
    }
    c.restore(); // end back-wall clip

    // ── 4. 3D object on the left ──────────────────────────────
    const objWX=-rw*0.16, objWY=-rh*0.02, objWZ=rd*0.48;
    const objPt=proj(objWX, objWY, objWZ);
    const OSX=objPt[0], OSY=objPt[1]+Math.sin(t*0.012)*3.5;
    const objSc=spotR*0.50/maxExt;

    // Warm ambient glow around object
    const objGlowR=objSc*maxExt*1.7;
    const objGlow=c.createRadialGradient(OSX+objSc*8,OSY-objSc*6,0,OSX,OSY,objGlowR);
    objGlow.addColorStop(0,'rgba(180,110,30,0.18)'); objGlow.addColorStop(1,'rgba(0,0,0,0)');
    c.fillStyle=objGlow; c.fillRect(0,0,CW,CH);

    if(lvl.blobs){
      // Blob rendering — smooth porcelain spheres (Shadowmatic style)
      // Sort blobs back-to-front by z (approximate)
      const sortedBlobs=[...lvl.blobs].sort((a,b)=>a.z-b.z);
      sortedBlobs.forEach(blob=>{
        drawBlob(c, OSX, OSY, objSc, blob, SS_OBJ_LIGHT);
      });
    } else {
      // Faceted polygon fallback
      const drawFaces=[...allFaces].sort((a,b)=>b.avgZ-a.avgZ);
      drawFaces.forEach(f=>{
        const n=ssNorm(f.v);
        if(n[2]<0) return;
        const diff=Math.max(0, n[0]*SS_OBJ_LIGHT[0]+n[1]*SS_OBJ_LIGHT[1]+n[2]*SS_OBJ_LIGHT[2]);
        const rim=Math.max(0, n[0]*0.52-n[1]*0.08+n[2]*0.12)*0.38;
        const b=0.10+0.74*diff+rim;
        const r=Math.round(25+b*198), g2=Math.round(7+b*120), bl=Math.round(3+b*54);
        c.beginPath();
        c.moveTo(OSX+f.v[0][0]*objSc, OSY+f.v[0][1]*objSc);
        f.v.forEach(v=>c.lineTo(OSX+v[0]*objSc, OSY+v[1]*objSc));
        c.closePath();
        c.fillStyle=`rgb(${r},${g2},${bl})`; c.fill();
        c.strokeStyle='rgba(12,2,1,0.50)'; c.lineWidth=0.55; c.stroke();
      });
    }

    // Thin wire
    const wireTop=proj(objWX, objWY-objSc*maxExt*0.85, objWZ);
    const ceilPt =proj(objWX, -rh, objWZ);
    c.save(); c.globalAlpha=0.20; c.strokeStyle='#806030'; c.lineWidth=0.7;
    c.setLineDash([3,5]);
    c.beginPath(); c.moveTo(ceilPt[0],ceilPt[1]); c.lineTo(wireTop[0],wireTop[1]);
    c.stroke(); c.setLineDash([]); c.restore();

    // Floor shadow
    const fsY=proj(objWX, rh*0.92, objWZ)[1];
    c.save(); c.translate(OSX,fsY); c.scale(1,0.18);
    const fsG=c.createRadialGradient(0,0,0,0,0,objSc*maxExt*1.1);
    fsG.addColorStop(0,'rgba(0,0,0,0.42)'); fsG.addColorStop(1,'rgba(0,0,0,0)');
    c.fillStyle=fsG; c.beginPath(); c.arc(0,0,objSc*maxExt*1.1,0,Math.PI*2);
    c.fill(); c.restore();

    // ── 5. Vignette ───────────────────────────────────────────
    const vig=c.createRadialGradient(CW*0.5,CH*0.5,CH*0.06,CW*0.5,CH*0.5,CH*0.92);
    vig.addColorStop(0,'rgba(0,0,0,0)'); vig.addColorStop(0.50,'rgba(0,0,0,0.30)');
    vig.addColorStop(1,'rgba(0,0,0,0.92)');
    c.fillStyle=vig; c.fillRect(0,0,CW,CH);
  }

  function ssResizeCanvas() {
    const cvs=document.getElementById('gameCvs');
    const r=cvs.getBoundingClientRect();
    cvs.width=r.width|0; cvs.height=r.height|0;
  }

  function ssLoop() {
    const cvs=document.getElementById('gameCvs');
    const lvl=SHADOW_LEVELS[ssIdx];
    ssDrawScene(cvs, lvl, ssRx, ssRy);
    if(!ssDone && ssCheckSolved()) {
      ssDone=true;
      setTimeout(()=>document.getElementById('ssSolvedOverlay').classList.add('show'), 350);
    }
    ssRaf=requestAnimationFrame(ssLoop);
  }

  function openShadowLevel(idx) {
    ssIdx=idx;
    const lvl=SHADOW_LEVELS[idx];
    ssRx=lvl.startRx ?? 0.65; ssRy=lvl.startRy ?? 0.95; ssDone=false;
    document.getElementById('ssLevelName').textContent=`Level ${idx+1}  ·  ${lvl.name}`;
    document.getElementById('ssHint').textContent=lvl.hint;
    document.getElementById('ssSolvedOverlay').classList.remove('show');
    document.getElementById('shadowScreen').classList.add('open');
    setTimeout(()=>{ ssResizeCanvas(); if(ssRaf) cancelAnimationFrame(ssRaf); ssLoop(); }, 40);
  }

  document.getElementById('btnSsBack').addEventListener('click', ()=>{
    document.getElementById('shadowScreen').classList.remove('open');
    if(ssRaf){ cancelAnimationFrame(ssRaf); ssRaf=null; }
  });

  document.getElementById('ssNextBtn').addEventListener('click', ()=>{
    openShadowLevel((ssIdx+1) % SHADOW_LEVELS.length);
  });

  const gameCvs=document.getElementById('gameCvs');
  gameCvs.addEventListener('mousedown', e=>{ ssDrag=true; ssLX=e.clientX; ssLY=e.clientY; });
  gameCvs.addEventListener('touchstart', e=>{ e.preventDefault(); ssDrag=true; ssLX=e.touches[0].clientX; ssLY=e.touches[0].clientY; },{passive:false});
  document.addEventListener('mousemove', e=>{
    if(!ssDrag||ssDone) return;
    ssRy+=(e.clientX-ssLX)*0.009; ssRx+=(e.clientY-ssLY)*0.009;
    ssLX=e.clientX; ssLY=e.clientY;
  });
  document.addEventListener('touchmove', e=>{
    if(!ssDrag||ssDone) return; e.preventDefault();
    ssRy+=(e.touches[0].clientX-ssLX)*0.009; ssRx+=(e.touches[0].clientY-ssLY)*0.009;
    ssLX=e.touches[0].clientX; ssLY=e.touches[0].clientY;
  },{passive:false});
  document.addEventListener('mouseup', ()=>ssDrag=false);
  document.addEventListener('touchend', ()=>ssDrag=false);

  document.querySelectorAll('.lvl-btn').forEach((btn,i)=>{
    btn.addEventListener('click', ()=>openShadowLevel(i));
  });

  window.addEventListener('resize', ()=>{
    if(document.getElementById('shadowScreen').classList.contains('open')) ssResizeCanvas();
  });
</script>
</body>
</html>
