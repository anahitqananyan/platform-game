<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Umbral</title>
  <meta name="description" content="Umbral — a platform adventure through shadow and light.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber:    #D4822A;
      --amber-dim:#7A4015;
      --text:     #F5EDE0;
      --muted:    #A06050;
      --border:   #5A2020;
    }

    html, body {
      height: 100%;
      background: #6B1020;
      color: var(--text);
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    #bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .home {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 3.5rem;
      padding: 2rem;
    }

    /* ── Logo ── */
    .logo {
      text-align: center;
      opacity: 0;
      transform: translateY(-18px);
      animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
    }

    .logo-eyebrow {
      font-size: 0.68rem;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.8rem;
    }

    .logo-title {
      font-family: 'Cinzel', 'Palatino Linotype', serif;
      font-size: clamp(4.5rem, 13vw, 9.5rem);
      font-weight: 900;
      letter-spacing: 0.08em;
      line-height: 1;
      text-transform: uppercase;
      color: var(--text);
      text-shadow:
        0 0 45px rgba(212, 130, 42, 0.55),
        0 0 90px rgba(212, 130, 42, 0.22),
        0 2px 4px rgba(0, 0, 0, 0.6);
      text-wrap: balance;
    }

    /* ── Menu ── */
    .menu {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 0.55rem;
      width: 100%;
      max-width: 255px;
    }

    .btn-play {
      width: 100%;
      padding: 0.95rem 1.5rem;
      font-family: 'Cinzel', serif;
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      background: var(--amber);
      color: #180408;
      border: none;
      cursor: pointer;
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.45s forwards;
      transition: box-shadow 220ms, transform 80ms;
    }

    .btn-play:hover {
      box-shadow: 0 0 30px rgba(212, 130, 42, 0.75), 0 0 65px rgba(212, 130, 42, 0.28);
    }

    .btn-play:active { transform: scale(0.98); }

    .btn-menu {
      position: relative;
      width: 100%;
      padding: 0.65rem 1rem 0.65rem 1.8rem;
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      text-align: left;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: color 150ms, border-color 150ms, background 150ms, padding-left 150ms;
      opacity: 0;
      animation: fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) var(--delay) forwards;
    }

    .btn-menu::before {
      content: '▶';
      position: absolute;
      left: 0.55rem;
      top: 50%;
      transform: translateY(-50%) scale(0.6);
      font-size: 0.52rem;
      color: var(--amber);
      opacity: 0;
      transition: opacity 150ms, transform 150ms;
    }

    .btn-menu:hover {
      color: var(--text);
      border-color: var(--amber-dim);
      background: rgba(212, 130, 42, 0.08);
      padding-left: 2.1rem;
    }

    .btn-menu:hover::before {
      opacity: 1;
      transform: translateY(-50%) scale(1);
    }

    .btn-play:focus-visible,
    .btn-menu:focus-visible {
      outline: 2px solid var(--amber);
      outline-offset: 3px;
    }

    .btn-menu:nth-child(2) { --delay: 0.55s; }
    .btn-menu:nth-child(3) { --delay: 0.63s; }

    .version {
      position: fixed;
      bottom: 1.25rem;
      right: 1.5rem;
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      opacity: 0.45;
      text-transform: uppercase;
      z-index: 2;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .logo, .btn-play, .btn-menu { animation: none; opacity: 1; transform: none; }
      .btn-play, .btn-menu { transition: none; }
    }

    /* ── Settings overlay ── */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(4, 0, 2, 0.82);
      opacity: 0;
      visibility: hidden;
      transition: opacity 280ms, visibility 280ms;
      padding: 1rem;
    }

    .overlay.open {
      opacity: 1;
      visibility: visible;
    }

    .settings-panel {
      position: relative;
      width: 100%;
      max-width: 380px;
      background: rgba(10, 2, 5, 0.97);
      border: 1px solid #3A1010;
      padding: 2.2rem 2.2rem 2rem;
      transform: translateY(22px);
      transition: transform 300ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .overlay.open .settings-panel {
      transform: translateY(0);
    }

    /* cut corner to match play button style */
    .settings-panel {
      clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px));
    }

    .panel-close {
      position: absolute;
      top: 0.85rem;
      right: 1rem;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1rem;
      cursor: pointer;
      line-height: 1;
      padding: 0.2rem 0.4rem;
      transition: color 150ms;
    }

    .panel-close:hover { color: var(--text); }

    .panel-title {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 2rem;
    }

    .panel-section {
      margin-bottom: 1.8rem;
    }

    .panel-section:last-child { margin-bottom: 0; }

    .panel-label {
      display: block;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.9rem;
    }

    .vol-track {
      display: flex;
      align-items: center;
      gap: 0.85rem;
    }

    .vol-icon {
      font-size: 0.85rem;
      color: var(--muted);
      flex-shrink: 0;
      user-select: none;
    }

    .vol-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 3px;
      background: var(--border);
      outline: none;
      cursor: pointer;
      border-radius: 2px;
    }

    .vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: var(--amber);
      cursor: pointer;
      box-shadow: 0 0 8px rgba(212, 130, 42, 0.6);
      transition: box-shadow 150ms, transform 150ms;
    }

    .vol-slider::-webkit-slider-thumb:hover {
      box-shadow: 0 0 16px rgba(212, 130, 42, 0.9);
      transform: scale(1.15);
    }

    .vol-slider::-moz-range-thumb {
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: var(--amber);
      border: none;
      cursor: pointer;
    }

    .vol-num {
      font-size: 0.72rem;
      font-variant-numeric: tabular-nums;
      color: var(--muted);
      min-width: 2.4ch;
      text-align: right;
      flex-shrink: 0;
    }

    .panel-divider {
      height: 1px;
      background: var(--border);
      opacity: 0.5;
      margin-bottom: 1.8rem;
    }

    .panel-desc {
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 1rem;
    }

    .btn-reset {
      width: 100%;
      padding: 0.7rem 1.2rem;
      font-family: inherit;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      background: transparent;
      color: #B85050;
      border: 1px solid #5A1818;
      cursor: pointer;
      transition: background 160ms, color 160ms, border-color 160ms;
    }

    .btn-reset:hover {
      background: rgba(180, 40, 40, 0.15);
      color: #E08080;
      border-color: #8A2828;
    }

    .btn-reset.confirming {
      color: #E08080;
      border-color: #8A2828;
      background: rgba(180, 40, 40, 0.12);
    }

    .btn-reset.done {
      color: #6FAE70;
      border-color: #2E5A2E;
      background: rgba(50, 120, 50, 0.12);
    }

    .btn-reset:focus-visible {
      outline: 2px solid #B85050;
      outline-offset: 3px;
    }
  </style>
</head>
<body>

<canvas id="bg"></canvas>

<main class="home">
  <div class="logo">
    <p class="logo-eyebrow">A Platform Adventure</p>
    <h1 class="logo-title">Umbral</h1>
  </div>

  <nav class="menu" aria-label="Main menu">
    <button class="btn-play" id="btnPlay">▶&nbsp;&nbsp;Play</button>
    <button class="btn-menu">Continue</button>
    <button class="btn-menu" id="btnSettings">Settings</button>
  </nav>
</main>

<!-- Settings panel -->
<div class="overlay" id="overlay" aria-hidden="true">
  <div class="settings-panel" role="dialog" aria-label="Settings">
    <button class="panel-close" id="btnClose" aria-label="Close settings">✕</button>
    <h2 class="panel-title">Settings</h2>

    <div class="panel-section">
      <label class="panel-label" for="volSlider">Music Volume</label>
      <div class="vol-track">
        <span class="vol-icon">♪</span>
        <input type="range" id="volSlider" class="vol-slider" min="0" max="100" value="40">
        <span class="vol-num" id="volNum">40</span>
      </div>
    </div>

    <div class="panel-divider"></div>

    <div class="panel-section">
      <p class="panel-desc">Erase all saved progress and return to the very beginning.</p>
      <button class="btn-reset" id="btnReset">Reset Game</button>
    </div>
  </div>
</div>

<p class="version">v1.0.0</p>

<script>
  // ── Canvas background ──────────────────────────────────────
  const canvas = document.getElementById('bg');
  const ctx    = canvas.getContext('2d');
  let W, H;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const SUN = { nx: 0.74, ny: 0.68 };

  const RAYS = [
    { angle: -1.65, hw: 0.022, alpha: 0.045, phase: 0.0  },
    { angle: -1.45, hw: 0.038, alpha: 0.060, phase: 1.3  },
    { angle: -1.25, hw: 0.018, alpha: 0.035, phase: 2.6  },
    { angle: -1.08, hw: 0.050, alpha: 0.055, phase: 0.7  },
    { angle: -0.92, hw: 0.025, alpha: 0.040, phase: 2.1  },
    { angle: -0.75, hw: 0.042, alpha: 0.050, phase: 3.4  },
    { angle: -0.58, hw: 0.020, alpha: 0.030, phase: 1.8  },
  ];

  const motes = Array.from({ length: 60 }, () => ({
    x:    Math.random(),
    y:    Math.random(),
    r:    Math.random() * 1.1 + 0.2,
    phase: Math.random() * Math.PI * 2,
    drift: (Math.random() - 0.5) * 0.00015,
    bob:   (Math.random() - 0.5) * 0.00010,
    alpha: Math.random() * 0.18 + 0.04
  }));

  function makeCloud(depth) {
    const cfg = [
      { speed: 0.10, scale: 1.0 },
      { speed: 0.055, scale: 1.6 },
      { speed: 0.028, scale: 2.4 }
    ][depth];
    return {
      x: Math.random(),
      y: 0.04 + Math.random() * 0.62,
      w: (0.10 + Math.random() * 0.18) * cfg.scale,
      h: (0.030 + Math.random() * 0.046) * cfg.scale,
      speed: cfg.speed * (0.7 + Math.random() * 0.6),
      depth,
      puffs: (() => { const n = 4 + Math.floor(Math.random() * 5); return Array.from({ length: n }, (_, i) => ({ ox: (i / Math.max(n - 1, 1)) * 0.9, oy: -(Math.random() * 0.42), rs: 0.4 + Math.random() * 0.7 })); })()
    };
  }

  const clouds = [
    ...Array.from({ length: 5 }, () => makeCloud(2)),
    ...Array.from({ length: 5 }, () => makeCloud(1)),
    ...Array.from({ length: 7 }, () => makeCloud(0))
  ];

  let t = 0;

  function drawSky() {
    const sx = SUN.nx * W, sy = SUN.ny * H;

    const base = ctx.createLinearGradient(0, 0, 0, H);
    base.addColorStop(0,   '#8B1A30');
    base.addColorStop(0.4, '#A82238');
    base.addColorStop(0.7, '#BC2A40');
    base.addColorStop(1,   '#962030');
    ctx.fillStyle = base;
    ctx.fillRect(0, 0, W, H);

    const sunBloom = ctx.createRadialGradient(sx, sy, 0, sx, sy, H * 0.95);
    sunBloom.addColorStop(0,    'rgba(248,158,38, 0.62)');
    sunBloom.addColorStop(0.18, 'rgba(218, 92,20, 0.38)');
    sunBloom.addColorStop(0.42, 'rgba(168, 42,16, 0.18)');
    sunBloom.addColorStop(0.72, 'rgba(100, 12,10, 0.06)');
    sunBloom.addColorStop(1,    'rgba(0,0,0,0)');
    ctx.fillStyle = sunBloom;
    ctx.fillRect(0, 0, W, H);

    const core = ctx.createRadialGradient(sx, sy - H * 0.04, 0, sx, sy - H * 0.04, H * 0.30);
    core.addColorStop(0,    'rgba(255,228,115, 0.50)');
    core.addColorStop(0.22, 'rgba(248,158, 40, 0.28)');
    core.addColorStop(0.55, 'rgba(192, 72, 18, 0.11)');
    core.addColorStop(1,    'rgba(0,0,0,0)');
    ctx.fillStyle = core;
    ctx.fillRect(0, 0, W, H);

    drawRays(sx, sy);

    const sTL = ctx.createRadialGradient(-W*0.05, -H*0.05, 0, -W*0.05, -H*0.05, W * 0.92);
    sTL.addColorStop(0,    'rgba(0,0,0,0.97)');
    sTL.addColorStop(0.30, 'rgba(0,0,0,0.78)');
    sTL.addColorStop(0.55, 'rgba(0,0,0,0.45)');
    sTL.addColorStop(0.78, 'rgba(0,0,0,0.15)');
    sTL.addColorStop(1,    'rgba(0,0,0,0)');
    ctx.fillStyle = sTL;
    ctx.fillRect(0, 0, W, H);

    const sBL = ctx.createRadialGradient(0, H*1.05, 0, 0, H*1.05, W * 0.80);
    sBL.addColorStop(0,    'rgba(2,0,1,0.97)');
    sBL.addColorStop(0.35, 'rgba(2,0,1,0.70)');
    sBL.addColorStop(0.62, 'rgba(0,0,0,0.28)');
    sBL.addColorStop(1,    'rgba(0,0,0,0)');
    ctx.fillStyle = sBL;
    ctx.fillRect(0, 0, W, H);

    const sTR = ctx.createRadialGradient(W*1.05, -H*0.05, 0, W*1.05, -H*0.05, W * 0.72);
    sTR.addColorStop(0,    'rgba(0,0,0,0.88)');
    sTR.addColorStop(0.40, 'rgba(0,0,0,0.50)');
    sTR.addColorStop(0.70, 'rgba(0,0,0,0.16)');
    sTR.addColorStop(1,    'rgba(0,0,0,0)');
    ctx.fillStyle = sTR;
    ctx.fillRect(0, 0, W, H);

    const sBR = ctx.createRadialGradient(W*1.05, H*1.05, 0, W*1.05, H*1.05, W * 0.68);
    sBR.addColorStop(0,    'rgba(0,0,0,0.88)');
    sBR.addColorStop(0.42, 'rgba(0,0,0,0.48)');
    sBR.addColorStop(0.75, 'rgba(0,0,0,0.14)');
    sBR.addColorStop(1,    'rgba(0,0,0,0)');
    ctx.fillStyle = sBR;
    ctx.fillRect(0, 0, W, H);

    const leftEdge = ctx.createLinearGradient(0, 0, W * 0.28, 0);
    leftEdge.addColorStop(0,    'rgba(0,0,0,0.80)');
    leftEdge.addColorStop(0.45, 'rgba(0,0,0,0.35)');
    leftEdge.addColorStop(1,    'rgba(0,0,0,0)');
    ctx.fillStyle = leftEdge;
    ctx.fillRect(0, 0, W, H);

    const rightEdge = ctx.createLinearGradient(W, 0, W * 0.75, 0);
    rightEdge.addColorStop(0,   'rgba(0,0,0,0.65)');
    rightEdge.addColorStop(0.5, 'rgba(0,0,0,0.22)');
    rightEdge.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = rightEdge;
    ctx.fillRect(0, 0, W, H);

    const midBand = ctx.createLinearGradient(0, H * 0.25, 0, H * 0.65);
    midBand.addColorStop(0,    'rgba(0,0,0,0)');
    midBand.addColorStop(0.45, 'rgba(0,0,0,0.48)');
    midBand.addColorStop(1,    'rgba(0,0,0,0)');
    ctx.fillStyle = midBand;
    ctx.fillRect(0, 0, W, H);

    const upperBand = ctx.createLinearGradient(0, 0, 0, H * 0.40);
    upperBand.addColorStop(0,   'rgba(0,0,0,0.42)');
    upperBand.addColorStop(0.6, 'rgba(0,0,0,0.15)');
    upperBand.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = upperBand;
    ctx.fillRect(0, 0, W, H);

    const diag1 = ctx.createLinearGradient(W * 0.58, 0, W * 0.05, H);
    diag1.addColorStop(0,    'rgba(0,0,0,0)');
    diag1.addColorStop(0.35, 'rgba(0,0,0,0.55)');
    diag1.addColorStop(0.62, 'rgba(0,0,0,0.32)');
    diag1.addColorStop(1,    'rgba(0,0,0,0)');
    ctx.fillStyle = diag1;
    ctx.fillRect(0, 0, W, H);

    const diag2 = ctx.createLinearGradient(0, 0, W * 0.52, H);
    diag2.addColorStop(0,    'rgba(0,0,0,0.38)');
    diag2.addColorStop(0.38, 'rgba(0,0,0,0.20)');
    diag2.addColorStop(0.68, 'rgba(0,0,0,0.06)');
    diag2.addColorStop(1,    'rgba(0,0,0,0)');
    ctx.fillStyle = diag2;
    ctx.fillRect(0, 0, W, H);

    const pool1 = ctx.createRadialGradient(W * 0.32, H * 0.10, 0, W * 0.32, H * 0.10, W * 0.44);
    pool1.addColorStop(0,    'rgba(0,0,0,0.82)');
    pool1.addColorStop(0.40, 'rgba(0,0,0,0.50)');
    pool1.addColorStop(1,    'rgba(0,0,0,0)');
    ctx.fillStyle = pool1;
    ctx.fillRect(0, 0, W, H);

    const pool2 = ctx.createRadialGradient(W * 0.15, H * 0.52, 0, W * 0.15, H * 0.52, W * 0.36);
    pool2.addColorStop(0,    'rgba(0,0,0,0.85)');
    pool2.addColorStop(0.45, 'rgba(0,0,0,0.48)');
    pool2.addColorStop(1,    'rgba(0,0,0,0)');
    ctx.fillStyle = pool2;
    ctx.fillRect(0, 0, W, H);

    const pool3 = ctx.createRadialGradient(W * 0.40, H * 0.85, 0, W * 0.40, H * 0.85, W * 0.40);
    pool3.addColorStop(0,    'rgba(0,0,0,0.78)');
    pool3.addColorStop(0.50, 'rgba(0,0,0,0.40)');
    pool3.addColorStop(1,    'rgba(0,0,0,0)');
    ctx.fillStyle = pool3;
    ctx.fillRect(0, 0, W, H);

    const pool4 = ctx.createRadialGradient(W * 0.88, H * 0.38, 0, W * 0.88, H * 0.38, W * 0.32);
    pool4.addColorStop(0,    'rgba(0,0,0,0.75)');
    pool4.addColorStop(0.48, 'rgba(0,0,0,0.38)');
    pool4.addColorStop(1,    'rgba(0,0,0,0)');
    ctx.fillStyle = pool4;
    ctx.fillRect(0, 0, W, H);

    const scAx = W * (0.26 + Math.sin(t * 0.0008) * 0.09);
    const scAy = H * (0.38 + Math.cos(t * 0.0006) * 0.07);
    const cloudA = ctx.createRadialGradient(scAx, scAy, 0, scAx, scAy, W * 0.30);
    cloudA.addColorStop(0,    'rgba(0,0,0,0.45)');
    cloudA.addColorStop(0.50, 'rgba(0,0,0,0.18)');
    cloudA.addColorStop(1,    'rgba(0,0,0,0)');
    ctx.fillStyle = cloudA;
    ctx.fillRect(0, 0, W, H);

    const scBx = W * (0.62 + Math.cos(t * 0.0007) * 0.07);
    const scBy = H * (0.18 + Math.sin(t * 0.0009) * 0.06);
    const cloudB = ctx.createRadialGradient(scBx, scBy, 0, scBx, scBy, W * 0.24);
    cloudB.addColorStop(0,    'rgba(0,0,0,0.40)');
    cloudB.addColorStop(0.52, 'rgba(0,0,0,0.14)');
    cloudB.addColorStop(1,    'rgba(0,0,0,0)');
    ctx.fillStyle = cloudB;
    ctx.fillRect(0, 0, W, H);

    const scCx = W * (0.10 + Math.sin(t * 0.0005) * 0.05);
    const scCy = H * (0.72 + Math.cos(t * 0.0007) * 0.05);
    const cloudC = ctx.createRadialGradient(scCx, scCy, 0, scCx, scCy, W * 0.26);
    cloudC.addColorStop(0,    'rgba(0,0,0,0.50)');
    cloudC.addColorStop(0.50, 'rgba(0,0,0,0.20)');
    cloudC.addColorStop(1,    'rgba(0,0,0,0)');
    ctx.fillStyle = cloudC;
    ctx.fillRect(0, 0, W, H);

    const vig = ctx.createRadialGradient(W * 0.50, H * 0.44, H * 0.12, W * 0.50, H * 0.44, H * 0.80);
    vig.addColorStop(0,    'rgba(0,0,0,0)');
    vig.addColorStop(0.52, 'rgba(0,0,0,0.28)');
    vig.addColorStop(1,    'rgba(0,0,0,0.86)');
    ctx.fillStyle = vig;
    ctx.fillRect(0, 0, W, H);

    const topBurn = ctx.createLinearGradient(0, 0, 0, H * 0.22);
    topBurn.addColorStop(0,   'rgba(0,0,0,0.95)');
    topBurn.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = topBurn;
    ctx.fillRect(0, 0, W, H);

    const botBurn = ctx.createLinearGradient(0, H * 0.78, 0, H);
    botBurn.addColorStop(0,   'rgba(0,0,0,0)');
    botBurn.addColorStop(1,   'rgba(0,0,0,0.92)');
    ctx.fillStyle = botBurn;
    ctx.fillRect(0, 0, W, H);
  }

  function drawRays(sx, sy) {
    const len = Math.max(W, H) * 1.8;
    RAYS.forEach(r => {
      const pulse = r.alpha + Math.sin(t * 0.004 + r.phase) * 0.015;
      ctx.save();
      ctx.globalAlpha = Math.max(0, pulse);
      const grad = ctx.createLinearGradient(sx, sy, sx + Math.cos(r.angle) * len * 0.5, sy + Math.sin(r.angle) * len * 0.5);
      grad.addColorStop(0,    'rgba(255,210,80,0.9)');
      grad.addColorStop(0.35, 'rgba(230,150,40,0.4)');
      grad.addColorStop(1,    'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(sx + Math.cos(r.angle - r.hw) * len, sy + Math.sin(r.angle - r.hw) * len);
      ctx.lineTo(sx + Math.cos(r.angle + r.hw) * len, sy + Math.sin(r.angle + r.hw) * len);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    });
  }

  function drawCloud(c) {
    const progress = (c.x + t * c.speed * 0.0007) % 1.18 - 0.09;
    const cx = progress * W;
    const cy = c.y * H;
    const cw = c.w * W, ch = c.h * H;

    const sx = SUN.nx * W, sy = SUN.ny * H;
    const dx = cx - sx, dy = cy - sy;
    const lit = Math.max(0, 1 - Math.sqrt(dx * dx + dy * dy) / (W * 0.55));

    const bodyR = Math.round(75  + lit * 85);
    const bodyG = Math.round(12  + lit * 42);
    const bodyB = Math.round(20  + lit * 10);
    const baseAlpha = [0.40, 0.26, 0.15][c.depth];

    ctx.globalAlpha = baseAlpha;
    ctx.fillStyle = `rgb(${bodyR},${bodyG},${bodyB})`;
    c.puffs.forEach(p => {
      ctx.beginPath();
      ctx.ellipse(cx + p.ox * cw, cy + p.oy * ch, cw * 0.22 * p.rs, ch * 0.58 * p.rs, 0, 0, Math.PI * 2);
      ctx.fill();
    });

    if (lit > 0.12) {
      c.puffs.forEach(p => {
        const px = cx + p.ox * cw, py = cy + p.oy * ch;
        const rx = cw * 0.22 * p.rs, ry = ch * 0.58 * p.rs;
        ctx.globalAlpha = baseAlpha * lit * 0.9;
        ctx.fillStyle = 'rgba(225,150,45,1)';
        ctx.beginPath();
        ctx.ellipse(px, py, rx * 1.10, ry * 1.10, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = baseAlpha * 2.6;
        ctx.fillStyle = `rgb(${bodyR},${bodyG},${bodyB})`;
        ctx.beginPath();
        ctx.ellipse(px, py, rx * 0.96, ry * 0.96, 0, 0, Math.PI * 2);
        ctx.fill();
      });
    }
    ctx.globalAlpha = 1;
  }

  function drawMotes() {
    motes.forEach(m => {
      m.phase += 0.007;
      m.x += m.drift;
      m.y += m.bob * Math.sin(m.phase);
      if (m.x > 1.02) m.x = -0.02;
      if (m.x < -0.02) m.x = 1.02;
      const dx = m.x - SUN.nx, dy = m.y - SUN.ny;
      const prox = Math.max(0, 1 - Math.sqrt(dx * dx + dy * dy) / 0.50);
      ctx.globalAlpha = m.alpha * prox * (0.6 + Math.sin(m.phase) * 0.4);
      ctx.fillStyle = '#E8A030';
      ctx.beginPath();
      ctx.arc(m.x * W, m.y * H, m.r, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
  }

  function frame() {
    t++;
    drawSky();
    [2, 1, 0].forEach(d => clouds.filter(c => c.depth === d).forEach(drawCloud));
    drawMotes();
    requestAnimationFrame(frame);
  }

  frame();

  // ── Ambient music (Web Audio API) ─────────────────────────
  let audioCtx, masterGain, reverbConv, dryBus, wetBus;
  let audioReady = false;
  let melodyTime = 0, chordTime = 0, melodyIdx = 0, chordIdx = 0;
  let scheduleTimer = null;

  // Am pentatonic: A C D E G at multiple octaves
  const MELODY = [
    [220.00, 4.2, 0.055],  // A3
    [293.66, 3.8, 0.045],  // D4
    [261.63, 4.6, 0.050],  // C4
    [329.63, 3.2, 0.042],  // E4
    [196.00, 5.0, 0.048],  // G3
    [440.00, 2.8, 0.036],  // A4
    [164.81, 5.4, 0.046],  // E3
    [392.00, 3.6, 0.044],  // G4
    [261.63, 4.2, 0.050],  // C4
    [220.00, 4.8, 0.052],  // A3
  ];

  // Soft chord pads (5ths and triads, Am feel)
  const CHORDS = [
    [[220, 329.63],         9.0, 0.026],   // Am fifth
    [[196, 293.66],         9.0, 0.024],   // G fifth
    [[174.61, 261.63],      9.0, 0.024],   // F fifth
    [[196, 261.63, 329.63], 9.0, 0.022],   // C triad
  ];

  function buildReverb(decaySec) {
    const conv = audioCtx.createConvolver();
    const rate = audioCtx.sampleRate;
    const len  = Math.floor(rate * decaySec);
    const buf  = audioCtx.createBuffer(2, len, rate);
    for (let ch = 0; ch < 2; ch++) {
      const d = buf.getChannelData(ch);
      for (let i = 0; i < len; i++) {
        d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 1.8) * 0.6;
      }
    }
    conv.buffer = buf;
    return conv;
  }

  function initAudio() {
    if (audioReady) return;
    audioReady = true;

    audioCtx  = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.40;
    masterGain.connect(audioCtx.destination);

    // Reverb chain
    reverbConv = buildReverb(4.5);
    const reverbGain = audioCtx.createGain();
    reverbGain.gain.value = 0.38;
    reverbConv.connect(reverbGain);
    reverbGain.connect(masterGain);

    dryBus = audioCtx.createGain();
    dryBus.gain.value = 1.0;
    dryBus.connect(masterGain);

    wetBus = audioCtx.createGain();
    wetBus.gain.value = 1.0;
    wetBus.connect(reverbConv);

    // Deep bass drone — A1 + E2
    [55, 82.41].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const g   = audioCtx.createGain();
      const lp  = audioCtx.createBiquadFilter();
      osc.type = 'sine';
      osc.frequency.value = freq + i * 0.12;
      lp.type = 'lowpass';
      lp.frequency.value = 170;
      g.gain.value = 0.042;
      osc.connect(lp); lp.connect(g); g.connect(masterGain);
      osc.start();
    });

    melodyTime = audioCtx.currentTime + 1.0;
    chordTime  = audioCtx.currentTime + 0.3;
    scheduleMelody();
    scheduleTimer = setInterval(() => {
      if (audioCtx.state === 'running') scheduleMelody();
    }, 800);
  }

  function playNote(freq, startTime, duration, gainVal) {
    const now = startTime;
    const atk = 0.7, rel = 1.3;

    // Two slightly detuned oscillators (chorus)
    [0, 5].forEach((detune, i) => {
      const osc    = audioCtx.createOscillator();
      const g      = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();

      osc.type = i === 0 ? 'sine' : 'triangle';
      osc.frequency.value = freq;
      osc.detune.value = detune;
      filter.type = 'lowpass';
      filter.frequency.value = 1400;
      filter.Q.value = 0.6;

      const vol = gainVal * (i === 0 ? 0.72 : 0.42);
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(vol, now + atk);
      g.gain.setValueAtTime(vol, now + duration - rel);
      g.gain.exponentialRampToValueAtTime(0.0001, now + duration);

      osc.connect(filter);
      filter.connect(g);
      g.connect(dryBus);
      g.connect(wetBus);
      osc.start(now);
      osc.stop(now + duration + 0.1);
    });
  }

  function scheduleMelody() {
    const horizon = audioCtx.currentTime + 4.0;

    while (melodyTime < horizon) {
      const [freq, dur, gain] = MELODY[melodyIdx % MELODY.length];
      playNote(freq, melodyTime, dur, gain);
      const gap = 0.7 + (melodyIdx % 4) * 0.35;
      melodyTime += dur * 0.52 + gap;
      melodyIdx++;
    }

    while (chordTime < horizon) {
      const [freqs, dur, gain] = CHORDS[chordIdx % CHORDS.length];
      freqs.forEach(f => playNote(f, chordTime, dur, gain));
      chordTime += dur * 0.75;
      chordIdx++;
    }
  }

  function setVolume(pct) {
    if (!masterGain) return;
    masterGain.gain.setTargetAtTime(pct / 100 * 0.72, audioCtx.currentTime, 0.08);
  }

  // Start audio on first any-click (browser autoplay policy)
  document.addEventListener('click', () => { initAudio(); }, { once: true });

  // ── Settings panel ─────────────────────────────────────────
  const overlay     = document.getElementById('overlay');
  const btnSettings = document.getElementById('btnSettings');
  const btnClose    = document.getElementById('btnClose');
  const volSlider   = document.getElementById('volSlider');
  const volNum      = document.getElementById('volNum');
  const btnReset    = document.getElementById('btnReset');

  function openSettings() {
    overlay.classList.add('open');
    overlay.setAttribute('aria-hidden', 'false');
    btnClose.focus();
  }

  function closeSettings() {
    overlay.classList.remove('open');
    overlay.setAttribute('aria-hidden', 'true');
    btnSettings.focus();
  }

  btnSettings.addEventListener('click', () => { try { initAudio(); } catch(e) {} openSettings(); });
  btnClose.addEventListener('click', closeSettings);

  // Close on backdrop click (not panel click)
  overlay.addEventListener('click', e => { if (e.target === overlay) closeSettings(); });

  // Close on Escape
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && overlay.classList.contains('open')) closeSettings();
  });

  // Volume
  volSlider.addEventListener('input', () => {
    const v = volSlider.value;
    volNum.textContent = v;
    setVolume(Number(v));
    // Update slider fill colour
    const pct = v + '%';
    volSlider.style.background =
      `linear-gradient(to right, #D4822A ${pct}, #5A2020 ${pct})`;
  });
  // Init fill
  volSlider.style.background = 'linear-gradient(to right, #D4822A 40%, #5A2020 40%)';

  // Reset game — two-step confirmation
  let resetStep = 0;
  let resetTimeout = null;

  btnReset.addEventListener('click', () => {
    if (resetStep === 0) {
      resetStep = 1;
      btnReset.textContent = 'Are you sure?';
      btnReset.classList.add('confirming');
      resetTimeout = setTimeout(() => {
        resetStep = 0;
        btnReset.textContent = 'Reset Game';
        btnReset.classList.remove('confirming');
      }, 3500);
    } else {
      clearTimeout(resetTimeout);
      resetStep = 0;
      // Clear any saved progress
      try { localStorage.removeItem('umbral_save'); } catch (_) {}
      btnReset.textContent = '✓ Reset Complete';
      btnReset.classList.remove('confirming');
      btnReset.classList.add('done');
      setTimeout(() => {
        btnReset.textContent = 'Reset Game';
        btnReset.classList.remove('done');
      }, 2200);
    }
  });
</script>
</body>
</html>
